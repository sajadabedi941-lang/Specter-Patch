; SPECTER PATCH - Strategic Air Base construct buttons (Object IDs remain *_AdvancedAirBase)
; Replaces Strategy Center build role for all Specter factions.

CommandButton Command_ConstructAmerica_AdvancedAirBase
  Command       = DOZER_CONSTRUCT
  Object        = America_AdvancedAirBase
  TextLabel     = CONTROLBAR:ConstructPatch_StrategicAirBase
  ButtonImage   = us_airfield
  ButtonBorderType = BUILD
  DescriptLabel = CONTROLBAR:ToolTipPatchBuildStrategicAirBase
End

