; SPECTER PATCH - Dozer construct buttons for Advanced Air Base (all factions)
; Wire these into each faction's dozer/worker CommandSet.
; Turkey is already wired via Command_ConstructTurkey_AdvancedAirBase.

CommandButton Command_ConstructAmerica_AdvancedAirBase
  Command       = DOZER_CONSTRUCT
  Object        = America_AdvancedAirBase
  TextLabel     = CONTROLBAR:ConstructPatch_AdvancedAirBase
  ButtonImage   = Patch_AdvancedAirBase
  ButtonBorderType = BUILD
  DescriptLabel = CONTROLBAR:ToolTipPatchBuildAdvancedAirBase
End

