; SPECTER PATCH - Ground systems expansion buttons (faction identity clones)
; Stock Specter already defines USA M142/THAAD, Russia 9K720/Bm30/Pantsir/S400/S500,
; China PHL03/DF21C/HQ9, Iran Fateh313/Bavar/Khordad — those use stock CommandButtons.
; This file only authors buttons for patch-owned Objects.

; ---- India ----
CommandButton Command_ConstructIndia_BrahMos
  Command       = UNIT_BUILD
  Object        = India_BrahMos
  TextLabel     = CONTROLBAR:ConstructIndia_BrahMos
  ButtonImage   = irq_alabbas
  ButtonBorderType = BUILD
  DescriptLabel = CONTROLBAR:ToolTipIndia_BrahMos
End

