; FILE: CommandSet_SpecterPatch.ini
; Iraq CommandCenterCommandSet copied per country (Iraq-copy method).

; Turkey_CommandCenterCommandSet defined in CommandSet_Turkey.ini (Phase 2)

; Future-faction CC missile slots live in CommandSet_MissileSystems.ini
; (country-specific TELs — no Iraq Sarab/Scud leakage).

; Advanced Air Base shells stay deterministic and non-productive until each
; future faction receives its own aircraft content. Undefined CommandSets can
; fail INI parsing; using rally/sell only avoids leaking Iraq units into them.
CommandSet Ukraine_AdvancedAirBaseCommandSet
  13 = Command_SetRallyPoint
  14 = Command_Sell
End

