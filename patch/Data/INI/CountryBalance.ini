;------------------------------------------------------------------------------
; AUTO CLASSIFICATION RULES (path / name-pattern — NO specific unit IDs)
; First match wins. Order: specific → general.
;------------------------------------------------------------------------------


CategoryRule TurkeyPhase4MLRS
  MatchNameRegex          = .*(TRG300|TRLG230|Bora|Kaplan).*
  Category                = Missile
  DefaultOrigin           = OwnerDomestic
  DefaultTechClass        = HighTechMissile
End

CategoryRule TurkeyPhase4AD
  MatchNameRegex          = .*(HISAR|SIPER|Korkut|Sungur).*
  Category                = AirDefense
  DefaultOrigin           = OwnerDomestic
  DefaultTechClass        = AdvancedAirDefense
End

