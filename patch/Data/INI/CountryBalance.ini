;==============================================================================
; SPECTER PATCH — Country Balance System (CENTRAL CONFIG)
; File: Data/INI/CountryBalance.ini
;
; SINGLE SOURCE OF TRUTH for country economic balance.
; Do not add per-unit cost overrides here. Classification is by Category /
; Origin / TechClass / path rules only — never by airframe marketing names.
;
; Multiplayer: deterministic. Finals are baked into Object/Upgrade BuildCost
; and BuildTime by tools/economy/apply_country_balance.py before play.
; All clients must use the same generated patch data.
;
; Formula:
;   FinalCost = BaseCost
;     × Country.<Unit|Aircraft|Weapon|Upgrade>CostMult
;     × Origin.CostMult
;     × TechClass.CostMult
;     × Category.CostMult
;     × Asymmetric.CostMult   (if EconomyRating matches)
;     × Domestic.CostMult     (if Origin=Domestic)
;
;   FinalTime = BaseTime × Origin.TimeMult × TechClass.TimeMult
;               × Asymmetric.TimeMult × Domestic.TimeMult
;               × Country.BuildTimeMult
;
; Apply:
;   python3 patch/tools/economy/apply_country_balance.py
;==============================================================================

CountryBalanceSystem
  Version                 = 1
  Deterministic           = Yes
  UseUnitRegistry         = No
  PreserveBaseMarkers     = Yes
  DefaultOrigin           = OwnerDomestic
  DefaultTechClass        = Standard
  SupplyDepositBase       = 20
  SupplyDepositTimingMS   = 15000
End

