;==============================================================================
; SPECTER PATCH — Country Balance System (CENTRAL CONFIG)
; File: Data/INI/CountryBalance.ini
;
; SINGLE SOURCE OF TRUTH for country economic balance.
; Do not add per-unit cost overrides here. Classification is by Category /
; Origin / TechClass / path rules only — never by airframe marketing names.
;
; Multiplayer: deterministic. Finals are baked into Object/Upgrade BuildCost
; and BuildTime by tools/economy/apply_country_balance.py before play.
; All clients must use the same generated patch data.
;
; Formula:
;   FinalCost = BaseCost
;     × Country.<Unit|Aircraft|Weapon|Upgrade>CostMult
;     × Origin.CostMult
;     × TechClass.CostMult
;     × Category.CostMult
;     × Asymmetric.CostMult   (if EconomyRating matches)
;     × Domestic.CostMult     (if Origin=Domestic)
;     × Country.DroneCostMult              (if Category=Drone)
;     × Country.DomesticDroneCostMult      (if Origin=Domestic AND Category=Drone)
;     × Country.DomesticWeaponCostMult     (if Origin=Domestic AND weapon/vehicle/AD)
;
;   FinalTime = BaseTime × Origin.TimeMult × TechClass.TimeMult
;               × Asymmetric.TimeMult × Domestic.TimeMult
;               × Country.BuildTimeMult
;
; Income (baked AutoDepositUpdate — MP deterministic):
;   SupplyCenter  → ModuleTag_PatchResourceIncome
;                   Deposit = SupplyDepositBase × SupplyIncomeMult
;   CommandCenter → ModuleTag_PatchOilIncome
;                   Deposit = OilDepositBase × OilIncomeMult
;                   (national oil wealth; do NOT fork shared TechOilDerrick)
;   Port/Harbor   → ModuleTag_PatchPortIncome
;                   Deposit = PortDepositBase × PortIncomeMult
;   WarFactory/MIC→ ModuleTag_PatchIndustrialIncome
;                   Deposit = IndustrialDepositBase × IndustrialIncomeMult
;
; Apply:
;   python3 patch/tools/economy/apply_country_balance.py
;==============================================================================

CountryBalanceSystem
  Version                 = 2
  Deterministic           = Yes
  UseUnitRegistry         = No
  PreserveBaseMarkers     = Yes
  DefaultOrigin           = OwnerDomestic
  DefaultTechClass        = Standard
  ; Passive channel bases (deterministic AutoDeposit bake)
  SupplyDepositBase       = 20
  SupplyDepositTimingMS   = 15000
  OilDepositBase          = 18
  OilDepositTimingMS      = 12000
  PortDepositBase         = 16
  PortDepositTimingMS     = 14000
  IndustrialDepositBase   = 14
  IndustrialDepositTimingMS = 16000
End

;------------------------------------------------------------------------------
; COUNTRY ECONOMIC MULTIPLIERS
; UnitCostMult     → tanks, vehicles, ships, infantry, artillery, buildings
; AircraftCostMult → Aircraft / Drone / SupportAircraft
; WeaponCostMult   → Missile category + HighTechMissile tech
; UpgradeCostMult  → Upgrade INI entries
; SupplyIncomeMult      → SupplyCenter / supply stash passive income
; OilIncomeMult         → oil-wealth AutoDeposit (faction economy buildings)
; PortIncomeMult        → port / harbor / trade-port income
; IndustrialIncomeMult  → MIC / WarFactory / industry buildings (USA high)
; TradeIncomeMult       → general trade overlay (legacy alias; prefer Port/Supply)
; DroneCostMult         → extra mult when Category=Drone (1.0 = none)
; DomesticWeaponCostMult→ extra mult when Origin=Domestic (weapons/vehicles/AD)
; DomesticDroneCostMult → extra mult when Origin=Domestic AND Category=Drone
;------------------------------------------------------------------------------

