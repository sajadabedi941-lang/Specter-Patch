; SPECTER PATCH - Faction economy ratings
; EconomyRating drives purchase-cost and resource-income modifiers.
; PurchaseCostMult > 1 = richer factions pay a premium (balance).
; PurchaseCostMult < 1 = poorer factions pay less for baseline gear.
; IncomeMult scales oil / port / trade / supply productivity overlays.

FactionEconomy America
  EconomyRating       = VeryHigh
  PurchaseCostMult    = 1.20
  IncomeMult          = 1.35
  UpgradeCostMult     = 1.10
End

