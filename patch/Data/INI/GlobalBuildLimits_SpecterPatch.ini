; SPECTER PATCH - Global build limit contract
; Engine enforces via MaxSimultaneousOfType + MaxSimultaneousLinkKey on Objects.
; Every faction (Specter + Turkey + future) MUST use these LinkKeys on matching objects.

; ---------------------------------------------------------------------------
; LinkKey                  MaxSimultaneousOfType   Applies to
; ---------------------------------------------------------------------------
; Patch_AirDefense         10                      SAM sites, AAA, SHORAD, AD installations
; Patch_ArtillerySite      6                       Fixed artillery emplacements
; Patch_StrategicLauncher  4                       MLRS / conventional strategic launchers
; Patch_Nuclear            1                       Nuclear SW buildings OR nuclear launchers
; ---------------------------------------------------------------------------

; Example (Turkey already annotated):
;   MaxSimultaneousOfType = 10
;   MaxSimultaneousLinkKey = Patch_AirDefense
;
;   MaxSimultaneousOfType = 1
;   MaxSimultaneousLinkKey = Patch_Nuclear

; Advanced Air Base (separate):
;   <SidePrefix>_AdvancedAirBase  MaxSimultaneousOfType = 4  (per faction)
