; SPECTER PATCH - Global build limitation system (all countries)
; Engine: MaxSimultaneousOfType + MaxSimultaneousLinkKey on each Object.
; Every faction MUST use these LinkKeys on matching unit classes.
; Turkey Phase 4 units are annotated. Future factions copy this contract.

;==============================================================================
; LinkKey                    Max    Applies to
;==============================================================================
; Patch_AirDefense           10     Mobile + fixed SAM, SPAAG, SHORAD, AD sites
; Patch_ArtillerySite         6     Fixed artillery emplacements
; Patch_StrategicLauncher     4     MLRS / ballistic / conventional TELs
; Patch_Nuclear               1     Nuclear SW / nuclear launchers
;==============================================================================

BuildLimit Patch_AirDefense
  MaxSimultaneousOfType   = 10
  MaxSimultaneousLinkKey  = Patch_AirDefense
  Categories              = AirDefense
  Notes                   = HISAR / SIPER / Korkut / Sungur / SAM sites / SPAAG
End

BuildLimit Patch_ArtillerySite
  MaxSimultaneousOfType   = 6
  MaxSimultaneousLinkKey  = Patch_ArtillerySite
  Categories              = Artillery
  Notes                   = Fixed howitzers / gun sites (not mobile MLRS)
End

BuildLimit Patch_StrategicLauncher
  MaxSimultaneousOfType   = 4
  MaxSimultaneousLinkKey  = Patch_StrategicLauncher
  Categories              = Missile
  Notes                   = TRG-300 / TRLG-230 / Bora / BM-21 / Scud-class TELs
End

BuildLimit Patch_Nuclear
  MaxSimultaneousOfType   = 1
  MaxSimultaneousLinkKey  = Patch_Nuclear
  Categories              = Building
  Notes                   = Nuclear silo / nuclear launcher only
End

; Object INI pattern (required on every matching Object for every Side):
;   MaxSimultaneousOfType = <Max from table>
;   MaxSimultaneousLinkKey = <LinkKey>
;
; CountryBalance CategoryRules classify AirDefense / Artillery / Missile;
; apply_country_balance.py does not rewrite LinkKeys — authors must set them
; on Objects (or use tools/economy/apply_build_limits.py).

; Phase F+ unique tech limits (anti-spam)
BuildLimit Patch_EliteAircraft
  MaxSimultaneousOfType   = 4
  MaxSimultaneousLinkKey  = Patch_EliteAircraft
  Categories              = Aircraft
  Notes                   = 5th-gen / signature fighters
End

BuildLimit Patch_UAV
  MaxSimultaneousOfType   = 4
  MaxSimultaneousLinkKey  = Patch_UAV
  Categories              = Drone
  Notes                   = Combat / stealth / heavy UAVs
End

BuildLimit Patch_EWAircraft
  MaxSimultaneousOfType   = 2
  MaxSimultaneousLinkKey  = Patch_EWAircraft
  Categories              = Aircraft
  Notes                   = Electronic warfare aircraft
End
