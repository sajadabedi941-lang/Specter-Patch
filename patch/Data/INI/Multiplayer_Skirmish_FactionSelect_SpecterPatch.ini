; SPECTER PATCH - Multiplayer / Skirmish faction selection notes (Turkey)
; Additive overlay only. Does NOT modify Specter archives (Data.zip / BIG).
;
; Comment-only registry (safe for engine — no unknown INI blocks).
;==============================================================================
;
; HOW SPECTER SELECTS FACTIONS
; ----------------------------
; Stock Specter has no FactionList.ini whitelist. Multiplayer and Skirmish
; lobbies enumerate PlayerTemplate entries with PlayableSide = Yes
; (same pattern as stock FactionNorthKorea in Specter PlayerTemplate.ini).
;
; TURKEY REGISTRATION (patch)
; ---------------------------
; PlayerTemplate: FactionTurkey
;   File: Data/INI/PlayerTemplate_SpecterPatch.ini
;   Side / BaseSide: Turkey
;   PlayableSide: Yes          ← enables MP + Skirmish picker
;   PreferredColor: R:227 G:10 B:23
;   IntrinsicSciences: SCIENCE_Turkey
;   Rank CS: SCIENCE_Turkey_CommandSetRank1 / 3 / 8
;   Shortcut CS: SpecialPowerShortcutTurkeySystem
;   StartingBuilding: Turkey_CommandCenter
;   StartingUnit0: Turkey_VT72B
;   StartingUnit1: TurkeySystemSpecialPowerShortcut
;   FlagWaterMark: WatermarkTurkey
;   SideIconImage: GameinfoTurkey
;   GeneralImage: Turkey_Logo
;   EnabledImage: SSObserverTurkey
;   LoadScreenImage: Turkey_Flag
;
; ControlBarScheme: Turkey8x6 (Side Turkey)
;   File: Data/INI/ControlBarScheme_SpecterPatch.ini
;
; MappedImages / Art:
;   Data/INI/MappedImages/HandCreated/Turkey_FactionImages.INI
;   Art/Textures/{WatermarkTurkey,GameinfoTurkey,Turkey_Logo,SSObserverTurkey,Turkey_Flag}.tga
;
; Basic tech tree:
;   Science_Turkey.ini (SCIENCE_Turkey root + Rank powers)
;   Upgrade_Turkey.ini + Upgrade_FactionTech.ini (Turkey UAV/Fighter/AD)
;   SCIENCE_Turkey_CommandSetRank* (General Stars)
;
; Audit: python3 patch/tools/economy/audit_turkey_faction_select.py
;
; DO NOT edit stock Data/INI/PlayerTemplate.ini — additive patch only.
