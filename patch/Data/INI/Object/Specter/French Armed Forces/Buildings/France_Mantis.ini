; SPECTER PATCH — France army kit (Specter Nato donor clone)
; Unique IDs only. Original Specter files untouched.


;------------------------------------------------------------------------------
Object France_Mantis
; PatchBaseCost = 1200
; PatchBaseTime = 18.0
; CountryBalance side=France origin=Domestic tech=Standard cat=Building key=UnitCostMult rating=High cost×0.9044 time×0.7938 => 1085 / 14.3s

  ; *** ART Parameters ***
  SelectPortrait         = Nat_mantis
  ButtonImage            = Nat_mantis
  Draw = W3DModelDraw ModuleTag_01

    OkToChangeModelColor = Yes

    DefaultConditionState
      Model             = NAT_MANTIS
      Turret            = Turret
      TurretPitch       = Turretle
      WeaponLaunchBone  = PRIMARY   WeaponA
      WeaponLaunchBone  = SECONDARY WeaponB
      WeaponFireFXBone  = PRIMARY   WeaponA
      WeaponFireFXBone  = SECONDARY WeaponB
      WeaponFireFXBone  = TERTIARY  WeaponA
      WeaponLaunchBone  = TERTIARY  WeaponA
    End
    AliasConditionState = NIGHT
    
    ConditionState      = DAMAGED
      Model             = NAT_MANTISD
      Turret            = Turret
      TurretPitch       = Turretle
      WeaponLaunchBone  = PRIMARY   WeaponA
      WeaponLaunchBone  = SECONDARY WeaponB
      WeaponFireFXBone  = PRIMARY   WeaponA
      WeaponFireFXBone  = SECONDARY WeaponB
      WeaponFireFXBone  = TERTIARY  WeaponA
      WeaponLaunchBone  = TERTIARY  WeaponA
    End
    AliasConditionState = DAMAGED NIGHT
    
    ConditionState      = REALLYDAMAGED RUBBLE
      Model             = NAT_MANTISD
      Turret            = Turret
      TurretPitch       = Turretle
      WeaponLaunchBone  = PRIMARY   WeaponA
      WeaponLaunchBone  = SECONDARY WeaponB
      WeaponFireFXBone  = PRIMARY   WeaponA
      WeaponFireFXBone  = SECONDARY WeaponB
      WeaponFireFXBone  = TERTIARY  WeaponA
      WeaponLaunchBone  = TERTIARY  WeaponA
    End
  End

  ; ***DESIGN parameters ***
  DisplayName       = OBJECT:Mantis
  Side              = France
  EditorSorting     = STRUCTURE
  Prerequisites
    Object = France_PowerStation
  End
  BuildCost           = 1085
  BuildTime           = 14.3           ; in seconds
  EnergyProduction = -2
  WeaponSet
    Conditions          = None 
    Weapon              = PRIMARY     35mm_AHEAD_MMABDWS
    Weapon              = SECONDARY   2x_GRATGM_Brimstone3
    Weapon              = TERTIARY    35mm_AHEAD_MMABDWS_AA
    AutoChooseSources   = PRIMARY     FROM_PLAYER FROM_AI FROM_SCRIPT
    AutoChooseSources   = SECONDARY   FROM_PLAYER FROM_AI FROM_SCRIPT
    PreferredAgainst    = PRIMARY     VEHICLE INFANTRY
    PreferredAgainst    = SECONDARY   VEHICLE
    PreferredAgainst    = TERTIARY    BALLISTIC_MISSILE PROJECTILE SMALL_MISSILE
  End
  VisionRange    = 820.0           ; Shroud clearing distance AND targeting range
  ShroudClearingRange = 465.0
  ArmorSet
    Conditions      = None
    Armor           = BaseDefenseArmor
    DamageFX        = StructureDamageFXNoShake
  End
  CommandSet        = AmericaPatriotBatteryCommandSet
  ExperienceValue     = 200 200 200 200  ; Experience point value at each level

  ; *** AUDIO Parameters ***
  VoiceSelect = PatriotBatterySelect
  SoundOnDamaged        = BuildingDamagedStateLight
  SoundOnReallyDamaged  = BuildingDestroy

  UnitSpecificSounds
    UnderConstruction     = UnderConstructionLoop
  End

  UnitSpecificSounds
  ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    TurretMoveStart = NoSound
    TurretMoveLoop = NoSound ;These aren't playing properly, will revisit (mp) TurretMoveLoopLoud
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority   = STRUCTURE
  KindOf          = PRELOAD STRUCTURE SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT IMMOBILE SCORE FS_TECHNOLOGY POWERED FS_BASE_DEFENSE IMMUNE_TO_CAPTURE
  Body            = StructureBody ModuleTag_04
    MaxHealth     = 1000.0
    InitialHealth = 1000.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 1200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End
 
  
  Behavior = StealthDetectorUpdate ModuleTag_StealthDetection_Radar_Inf
    DetectionRate             = 500
    DetectionRange            = 140
    ExtraForbiddenKindOf      = BALLISTIC_MISSILE SMALL_MISSILE
    CanDetectWhileGarrisoned  = No
    CanDetectWhileContained   = No
  End
  Behavior = BaseRegenerateUpdate ModuleTag_05
    ;No data
  End 
  Behavior = AIUpdateInterface ModuleTag_06
    Turret
      TurretTurnRate        = 180
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
      TurretPitchRate       = 160.0
      AllowsPitch           = Yes
      FiresWhileTurning     = Yes
    End
    AutoAcquireEnemiesWhenIdle = Yes ;ATTACK_BUILDINGS; defensive weapon
    MoodAttackCheckRate        = 1
  End
  Behavior = DestroyDie ModuleTag_08
    ;nothing
  End
  Behavior             = CreateObjectDie ModuleTag_09
    CreationList  = OCL_AmericanRangerDebris03
    ExemptStatus  = UNDER_CONSTRUCTION
  End
  Behavior             = FXListDie ModuleTag_10
    DeathFX       = FX_StructureTinyDeath
  End

  Behavior = FlammableUpdate ModuleTag_12
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 5       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  Behavior = StealthDetectorUpdate ModuleTag_InfantryDetection
    DetectionRate             = 500
    DetectionRange            = 300
    CanDetectWhileGarrisoned  = No
    CanDetectWhileContained   = No
    ;ExtraRequiredKindOf       = INFANTRY VEHICLE
    ExtraForbiddenKindOf      = AIRCRAFT DRONE
  End

  Behavior = TransitionDamageFX ModuleTag_14
    ;-------------DESIGNED FOR TINY SIZED FACTION BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1       = Bone:None RandomBone:No PSys:StructureTransitionTinySmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionTinySmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionTinyExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionTinyShockwave
  End

  Geometry            = CYLINDER
  GeometryMajorRadius = 38.0
  GeometryMinorRadius = 30.0
  GeometryHeight      = 14.0
  GeometryIsSmall     = No
  Shadow          = SHADOW_VOLUME
  BuildCompletion = PLACED_BY_PLAYER

End