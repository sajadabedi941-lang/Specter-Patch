; SPECTER PATCH — Germany army kit (Specter Nato donor clone)
; Unique IDs only. Original Specter files untouched.

Object Germany_TankPuma
; PatchBaseCost = 950
; PatchBaseTime = 17.0
; CountryBalance side=Germany origin=Domestic tech=Standard cat=Tank key=UnitCostMult rating=VeryHigh cost×0.9101 time×0.7857 => 865 / 13.4s
Scale = 0.95
  ; *** ART Parameters ***
  SelectPortrait         = Nat_puma
  ButtonImage            = Nat_puma
  Draw = W3DTankDraw ModuleTag_01
    ExtraPublicBone = Laser 
    DefaultConditionState
      Model               = NAT_Puma
      Turret              = Turret
      WeaponFireFXBone    = PRIMARY TURRETMS01
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY TURRETMS01
      WeaponLaunchBone    = PRIMARY TURRETMS01
      WeaponFireFXBone    = SECONDARY MISSILE01
      WeaponMuzzleFlash   = SECONDARY MISSILE01
      WeaponLaunchBone    = SECONDARY MISSILE01
    End
    ConditionState       = REALLYDAMAGED
      Model              = NAT_PumaD
    End
    ConditionState       = RUBBLE
      Model              = NAT_PumaD
    End
    TrackMarks           = EXTnkTrack.tga
    TreadAnimationRate      = 2.0  ; amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
    OkToChangeModelColor = Yes
  End
  ; ***DESIGN parameters ***
  DisplayName            = OBJECT:Puma
  Side                   = Germany
  EditorSorting          = VEHICLE
  TransportSlotCount     = 3
  ArmorSet
    Conditions           = None
    Armor                = M2A3_BuskIII_Armor
    DamageFX             = TankDamageFX
  End
  WeaponSet
    Conditions           = None 
    Weapon               = PRIMARY   30mm_MK30_2_ABM
    PreferredAgainst     = PRIMARY   VEHICLE INFANTRY
    Weapon               = SECONDARY 2x_Spike_LR_ATGM_Puma
    PreferredAgainst     = SECONDARY VEHICLE STRUCTURE
  End
  BuildCost           = 865
  BuildTime           = 13.4          ;in seconds    
  VisionRange            = 474.0
  ShroudClearingRange = 398.0
  ExperienceValue        = 100 100 200 400 ;Experience point value at each level
  ExperienceRequired     = 0 200 300 600 ;Experience points needed to gain each level
  IsTrainable            = Yes  ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet             = GenericIFVcommandset  
  ; *** AUDIO Parameters ***
  VoiceSelect           = MicrowaveTankVoiceSelect
  VoiceMove             = MicrowaveTankVoiceMove
  VoiceGuard            = MicrowaveTankVoiceMove
  VoiceAttack           = MicrowaveTankVoiceAttack
  SoundMoveStart        = MicrowaveTankMoveStart
  SoundMoveStartDamaged = MicrowaveTankMoveStart
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate         = MicrowaveTankVoiceCreate
    VoiceEnter             = MicrowaveTankVoiceMove
    SoundEject          = PilotSoundEject
    VoiceEject          = PilotVoiceEject
    VoiceCrush          = MicrowaveTankVoiceMove
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority          = UNIT
  KindOf                 = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS TRANSPORT SCORE VEHICLE
  Body                   = ActiveBody ModuleTag_02
    MaxHealth       = 1250
    InitialHealth   = 1250
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 960
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate       = 170 ;   // turn rate, in degrees per sec
      ControlledWeaponSlots= PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate        = 2
  End
  Locomotor            = SET_NORMAL MTU_V10_892_DieselEngine
  Behavior = PhysicsBehavior ModuleTag_04
    Mass                 = 220.0
  End
  Behavior = PointDefenseLaserUpdate ModuleTag_MUSS
    WeaponTemplate        = MUSS_ECM_Jammer_Puma
    PrimaryTargetTypes    = SMALL_MISSILE PROJECTILE
    ScanRate              = 650
    ScanRange             = 150
    PredictTargetVelocityFactor = 3.0
  End
  Behavior = TransportContain ModuleTag_22
    Slots                 = 6
    ScatterNearbyOnExit   = Yes
    HealthRegen%PerSec    = 8
    EnterSound            = GarrisonEnter
    ExitSound             = GarrisonExit
    DamagePercentToUnits  = 60%
    AllowInsideKindOf     = INFANTRY
    ExitDelay             = 250
    NumberOfExitPaths     = 3 ; Defaults to 1.  Set 0 to not use ExitStart/ExitEnd, set higher than 1 to use ExitStart01-nn/ExitEnd01-nn
    GoAggressiveOnExit    = Yes ; AI Will tell people to set their mood to Aggressive on exiting
  End
  ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_10
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier  = 50
    DestructionDelay  = 500
    DestructionDelayVariance  = 100
    FX  = INITIAL  FX_GenericTankDeathEffect
    OCL = MIDPOINT OCL_M2A3DeathEffect
    FX  = FINAL    FX_GenericTankDeathExplosion
  End
  Behavior                 = TransitionDamageFX ModuleTag_12
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = DestroyDie ModuleTag_13
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  Behavior = FXListDie ModuleTag_14
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_15
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_MicrowaveTankDeath_CrushEffect
  End
  Behavior                    = CreateCrateDie ModuleTag_CratesChange
   CrateData             = SalvageCrateData
   ;CrateData             = EliteTankCrateData
   ;CrateData             = HeroicTankCrateData
  End
  Behavior = ProductionUpdate ModuleTag_Prod01
    MaxQueueEntries = 1; So you can't build multiple upgrades in the same frame
  End
  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  Behavior = CommandButtonHuntUpdate  ModuleTag_24 ; allows use of command button hunt script with this unit. 
  End
  Geometry               = BOX
  GeometryMajorRadius    = 19.0
  GeometryMinorRadius    = 10.0
  GeometryHeight         = 15.0     
  GeometryIsSmall        = Yes    
  Shadow = SHADOW_VOLUME
  ;ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
  Scale = 1
End