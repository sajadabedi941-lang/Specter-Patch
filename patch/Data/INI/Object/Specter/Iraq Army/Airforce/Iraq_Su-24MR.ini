Object Iraq_Su-24MR
; PatchBaseCost = 5000
; PatchBaseTime = 35.0
; CountryBalance side=Iraq origin=Domestic tech=Standard cat=Aircraft key=AircraftCostMult rating=Low cost×0.7106 time×0.81 => 3553 / 28.4s
; PatchBaseCost = 5000
; PatchBaseTime = 35

  ; *** ART Parameters ***
  SelectPortrait         = irq_su24mr
  ButtonImage            = irq_su24mr
  
  
  ;UpgradeCameo1  = Upgrade_Kab-2500
  UpgradeCameo1  = Upgrade_AmericaCountermeasures
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DModelDraw ModuleTag_01

    OkToChangeModelColor = Yes

    DefaultConditionState
      Model               = Irq_Su24MR
      HideSubObject       = BurnerFX01 BurnerFX02
      Animation           = Irq_Su24MR.Irq_Su24MR
      AnimationMode       = ONCE_BACKWARDS
      WeaponLaunchBone    = PRIMARY   WeaponA
      WeaponLaunchBone    = SECONDARY Weaponb
      WeaponLaunchBone    = TERTIARY  WeaponC
    End

    ConditionState        = JETEXHAUST
      ; exhaust
      ParticleSysBone     = WINGTIP01 JetContrail
      ParticleSysBone     = WINGTIP02 JetContrail
      Animation           = Irq_Su24MR.Irq_Su24MR
      AnimationMode       = ONCE
      TransitionKey       = TRANS_JETEXHAUST
      ParticleSysBone     = ENGINE01 SpectreEngineFlare2
      ParticleSysBone     = ENGINE02 SpectreEngineFlare2
    End

    ConditionState        = JETEXHAUST JETAFTERBURNER
      ; exhaust
      ParticleSysBone     = Wingtip01 JetContrail
      ParticleSysBone     = Wingtip02 JetContrail

      Animation           = Irq_Su24MR.Irq_Su24MR
      AnimationMode       = ONCE_BACKWARDS
      ; afterburner
      ShowSubObject       = BurnerFX01 BurnerFX02
      ParticleSysBone     = Engine01 JetLenzflare
      ParticleSysBone     = Engine02 JetLenzflare
    End
    ConditionState = ATTACKING
      Model               = Irq_Su24MR
      Animation           = Irq_Su24MR.Irq_Su24MR
      HideSubObject       = BurnerFX01 BurnerFX02
      Animation           = Irq_Su24MR.Irq_Su24MR
      AnimationMode       = ONCE
      Flags               = MAINTAIN_FRAME_ACROSS_STATES
    End
    ConditionState = DOOR_1_CLOSING
      Model               = Irq_Su24MR
      Animation           = Irq_Su24MR.Irq_Su24MR
      HideSubObject       = BurnerFX01 BurnerFX02
      Animation           = Irq_Su24MR.Irq_Su24MR
      AnimationMode       = ONCE_BACKWARDS
      Flags               = MAINTAIN_FRAME_ACROSS_STATES
    End

    ConditionState        = REALLYDAMAGED
      Model               = Irq_Su24MR
      ; damage
      ParticleSysBone     = Smoke01 JetSmoke
      ParticleSysBone     = Engine01 JetEngineDamagedSmoke
    End
    
    ConditionState        = REALLYDAMAGED JETEXHAUST
      Model               = Irq_Su24MR
      ; damage
      ParticleSysBone     = Smoke01 JetSmoke
      ParticleSysBone     = Engine01 JetEngineDamagedSmoke
      ; exhaust
      ParticleSysBone     = Wingtip01 JetContrail
      ParticleSysBone     = Wingtip02 JetContrail
    End

    ConditionState        = REALLYDAMAGED JETEXHAUST JETAFTERBURNER
      Model               = Irq_Su24MR
      ; damage
      ParticleSysBone     = Smoke01 JetSmoke
      ParticleSysBone     = Engine01 JetEngineDamagedSmoke
      ; afterburner
      ShowSubObject       = BurnerFX01 BurnerFX02
      ParticleSysBone     = Engine01 JetLenzflare
      ;ParticleSysBone     = Engine02 JetLenzflare
      ; exhaust
      ParticleSysBone     = Wingtip01 JetContrail
      ParticleSysBone     = Wingtip02 JetContrail
    End

    ConditionState        = RUBBLE
      Model               = Irq_Su24MR
      HideSubObject       = None 
      ShowSubObject       = None
    End

    ConditionState        = RUBBLE JETEXHAUST JETAFTERBURNER
      Model               = Irq_Su24MR
      ;HideSubObject is needed cause there're inherited from default condition state      
      HideSubObject       = None 
      ShowSubObject       = None
      ParticleSysBone     = Engine01 JetExhaust
      ParticleSysBone     = Engine02 JetExhaust
      ; exhaust
      ParticleSysBone     = Wingtip01 JetContrail
      ParticleSysBone     = Wingtip02 JetContrail
    End

    OkToChangeModelColor = Yes

  End

