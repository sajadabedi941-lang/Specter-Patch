  ; *** ART Parameters ***
  SelectPortrait         = irq_lamiaa
  ButtonImage            = irq_lamiaa
  Draw = W3DTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ProjectileBoneFeedbackEnabledSlots = PRIMARY
    ExtraPublicBone    = Missile
    DefaultConditionState
      Model              = Irq_Lamiaa
      WeaponLaunchBone   = PRIMARY   Missile
      WeaponFireFXBone   = PRIMARY   WeaponFX
      Turret             = TurretF
    End
    ConditionState       = REALLYDAMAGED
      Model              = Irq_Lamiaa
      WeaponLaunchBone   = PRIMARY   Missile
      WeaponFireFXBone   = PRIMARY   WeaponFX
      Turret             = TurretF
    End
    ConditionState       = RUBBLE
      Model              = Irq_Lamiaa
      WeaponLaunchBone   = PRIMARY   Missile
      WeaponFireFXBone   = PRIMARY   WeaponFX
      Turret             = TurretF
    End
    TrackMarks              = EXTireTrack.tga
    LeftFrontTireBone           = Tire01
    RightFrontTireBone          = Tire02
    MidLeftRearTireBone         = Tire03
    MidRightRearTireBone        = Tire04
    LeftRearTireBone            = Tire05
    RightRearTireBone           = Tire06
    TireRotationMultiplier      = 0.2   ; this * speed = rotation.
    PowerslideRotationAddition  = 2.5   ; This speed is added to the rotation speed when powersliding.
    Dust                    = RocketBuggyDust
    DirtSpray               = RocketBuggyDirtSpray
    PowerslideSpray         = RocketBuggyDirtPowerSlide
  End
  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:Lamiaa
  Side                = Iraq
  EditorSorting       = VEHICLE
  TransportSlotCount  = 8                ;how many "slots" we take in a transport (0 == not transportable)
  BuildCost           = 302
  BuildTime           = 7.7      ;in seconds
  VisionRange         = 300
  ShroudClearingRange = 120
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY Quds5Launching
  End
  ArmorSet
    Conditions      = None
    Armor           = TruckArmor
    DamageFX        = TankDamageFX
  End
  Prerequisites
    Object          = Iraq_MIC
  End
  VisionRange     = 300
  ShroudClearingRange = 150
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet            = Iraq_Bm21CommandSet
  ; *** AUDIO Parameters ***
  VoiceSelect = PaladinTankVoiceSelect
  VoiceMove = PaladinTankVoiceMove
  VoiceGuard = PaladinTankVoiceMove
  VoiceAttack = PaladinTankVoiceAttack
  SoundMoveStart = PaladinTankMoveStart
  SoundMoveStartDamaged = PaladinTankMoveStart

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = PaladinTankVoiceCreate
    TurretMoveLoop = TurretMoveLoop
    SoundEject = PilotSoundEject
    VoiceEject = PilotVoiceEject
    VoiceCrush = PaladinTankVoiceCrush
    VoiceEnter = PaladinTankVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE DONT_AUTO_CRUSH_INFANTRY CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE SCORE

  Body = ActiveBody ModuleTag_023TA
    MaxHealth       = 400
    InitialHealth   = 400

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 240
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = AIUpdateInterface ModuleTag_03FA3
      Turret
      TurretTurnRate = 80   ; turn rate, in degrees per sec
      TurretPitchRate = 30
      FirePitch = 45  ; Instead of aiming pitchwise at the target, it will aim here
      AllowsPitch = Yes
      ControlledWeaponSlots = PRIMARY
    End
    AutoAcquireEnemiesWhenIdle = Yes NotWhileAttacking
   End

  Locomotor = SET_NORMAL Zil-375V8
  Behavior = PhysicsBehavior ModuleTag_04D3
    Mass = 100.0
  End

  
  Behavior = ProductionUpdate ModuleTag_08AD
    MaxQueueEntries = 1; So you can't build multiple upgrades in the same frame
  End

  

  Behavior = SlowDeathBehavior ModuleTag_11
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 25
    DestructionDelay = 1
    OCL = INITIAL  OCL_InitialHumveeDebris
    FX  = FINAL    FX_BattleMasterExplosionOneFinal
    OCL = FINAL    OCL_FinalHumveeDebris
  End

  Behavior = DestroyDie ModuleTag_12
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior = FXListDie ModuleTag_13
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  Behavior = CreateCrateDie ModuleTag_CratesChange
    CrateData = SalvageCrateData
    ;CrateData = EliteTankCrateData
    ;CrateData = HeroicTankCrateData
  End

  
  
  Behavior = TransitionDamageFX ModuleTag_14A33ADA
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  
  Behavior = FlammableUpdate ModuleTag_213RE3AE
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  
  Geometry = BOX
  GeometryMajorRadius = 15.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 10.0     
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME 
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length   

End