; SPECTER PATCH — Italy army kit (Specter Nato donor clone)
; Unique IDs only. Original Specter files untouched.

;------------------------------------------------------------------------------
Object Italy_WarFactory
; PatchBaseCost = 2000
; PatchBaseTime = 15.0
; CountryBalance side=Italy origin=Domestic tech=Standard cat=Building key=UnitCostMult rating=High cost×0.8882 time×0.81 => 1776 / 12.2s
Scale = 0.9


  ; *** ART Parameters ***
  SelectPortrait = us_warfactory
  ButtonImage    = us_warfactory
  
  ; ------------ the main factory itself -----------------
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes  
    ; day **************************************************
    DefaultConditionState
      Model           = US_WarFactory
      Animation       = US_WarFactory.US_WarFactory
      AnimationMode   = LOOP
      ParticleSysBone = Smoke01 SteamVent
      ParticleSysBone = Smoke02 SteamVent     
    End    
    ConditionState = DAMAGED
      Model           = US_WarFactory
      Animation       = US_WarFactory.US_WarFactory
      AnimationMode   = LOOP
      ParticleSysBone = Smoke01 SteamVent
      ParticleSysBone = Smoke02 SteamVent
    End
    ConditionState = REALLYDAMAGED RUBBLE
      Model           = US_WarFactory
      Animation       = US_WarFactory.US_WarFactory
      AnimationMode   = LOOP
      ParticleSysBone = Smoke01 SteamVent
      ParticleSysBone = Smoke02 SteamVent 
    End
    
    AliasConditionState  = SOLD 
    AliasConditionState  = SOLD DAMAGED
    AliasConditionState  = SOLD REALLYDAMAGED
    AliasConditionState  = SOLD NIGHT
    AliasConditionState  = SOLD NIGHT DAMAGED
    AliasConditionState  = SOLD NIGHT REALLYDAMAGED
    AliasConditionState  = SOLD SNOW
    AliasConditionState  = SOLD SNOW DAMAGED
    AliasConditionState  = SOLD SNOW REALLYDAMAGED
    AliasConditionState  = SOLD NIGHT SNOW
    AliasConditionState  = SOLD NIGHT SNOW DAMAGED
    AliasConditionState  = SOLD NIGHT SNOW REALLYDAMAGED
  End
  PlacementViewAngle = -135

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:WarFactory
  Side             = Italy
  EditorSorting    = STRUCTURE
  Prerequisites
    Object = Italy_SupplyCenter
  End
  BuildCost           = 1776
  BuildTime           = 12.2           ; in seconds

  EnergyProduction = -2
  CommandSet       = Italy_WarFactoryCommandSet
  VisionRange     = 218.0           ; Shroud clearing distance
  ShroudClearingRange = 214.0
  ArmorSet
    Conditions      = None
    Armor           = StructureArmor
    DamageFX        = StructureDamageFXNoShake
  End
  ExperienceValue     = 200 200 200 200  ; Experience point value at each level

  ; *** AUDIO Parameters ***
  VoiceSelect = WarFactoryUSASelect
  SoundOnDamaged        = BuildingDamagedStateLight
  SoundOnReallyDamaged  = BuildingDestroy

  UnitSpecificSounds
    UnderConstruction     = UnderConstructionLoop
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority   = STRUCTURE
  KindOf          = PRELOAD STRUCTURE SELECTABLE IMMOBILE REPAIR_PAD SCORE CAPTURABLE FS_FACTORY AUTO_RALLYPOINT MP_COUNT_FOR_VICTORY FS_WARFACTORY
  Body            = StructureBody ModuleTag_09
    MaxHealth       = 2000.0
    InitialHealth   = 2000.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 2200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End
  Behavior = ProductionUpdate ModuleTag_10
    NumDoorAnimations            = 1
    DoorOpeningTime              = 3250  ;in mSeconds
    DoorWaitOpenTime             = 3000  ;in mSeconds
    DoorCloseTime                = 4000  ;in mSeconds
    ConstructionCompleteDuration = 1500  ;in mSeconds
  End
  Behavior = DefaultProductionExitUpdate ModuleTag_11
    UnitCreatePoint   = X: -10.0  Y:-30.0   Z:0.0
    NaturalRallyPoint = X: 53.0  Y:-30.0   Z:0.0
  End
  Behavior = RepairDockUpdate ModuleTag_12
    TimeForFullHeal   = 5000   ;(in milliseconds)     
    NumberApproachPositions = 5
  End
  Behavior = BaseRegenerateUpdate ModuleTag_13
    ;No data
  End 
  
;---- Removed module
;  Behavior = SlowDeathBehavior ModuleTag_14
;    DestructionDelay = 500
;    FX             = FINAL   FX_StructureMediumDeath
;    OCL            = FINAL   OCL_AmericaWarFactoryDebris
;  End

  Behavior = TransitionDamageFX ModuleTag_15
    ;-------------DESIGNED FOR MEDIUM SIZED FACTION BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1       = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionMediumExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionMediumShockwave
  End

  Behavior             = CreateObjectDie ModuleTag_16
    CreationList  = OCL_AmericanRangerDebris05
    ExemptStatus  = UNDER_CONSTRUCTION
  End

  Behavior = FlammableUpdate ModuleTag_18
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 5       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  Behavior             = CreateObjectDie ModuleTag_20
    CreationList  = OCL_LargeStructureDebris
  End
  
  Behavior             = FXListDie ModuleTag_21
    DeathFX       = FX_StructureMediumDeath
  End
  
  Behavior             = DestroyDie ModuleTag_22
    ;nothing
  End
  Behavior                  = ObjectCreationUpgrade ModuleTag_MMT
    UpgradeObject           = OCL_NATBTD
    TriggeredBy             = Upgrade_ICBM_BoosterKiller
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_KillMarker
    DeathWeapon  = GenericTargetMarkerKiller
    StartsActive = Yes
  End
  Behavior          = FireWeaponWhenDeadBehavior ModuleTag_KillMarker2
    DeathWeapon     = GenericTargetMarkerKiller
    StartsActive    = Yes
    RequiredStatus  = SOLD
  End

  Geometry            = BOX
  GeometryMajorRadius = 73.0
  GeometryMinorRadius = 70.0
  GeometryHeight      = 40.0
  GeometryIsSmall     = No
  FactoryExitWidth    = 25     ; How much space to leave for units exiting.
  Shadow          = SHADOW_VOLUME
  BuildCompletion = PLACED_BY_PLAYER

End