;------------------------------------------------------------------------------
Object Japan_Bmp2K

  ; *** ART Parameters ***
  SelectPortrait         = irq_bmp2k
  ButtonImage            = irq_bmp2k
  
  
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DTankDraw ModuleTag_01
    OkToChangeModelColor = Yes

    

    DefaultConditionState
      Model = Irq_Bmp2k
      Turret = TURRET
      WeaponFireFXBone  = PRIMARY TURRETMS01
      WeaponMuzzleFlash = PRIMARY TURRETMS01
      WeaponLaunchBone  = PRIMARY TURRETMS01
      WeaponRecoilBone  = PRIMARY BARREL
      WeaponFireFXBone  = SECONDARY TURRETMS02
      WeaponLaunchBone  = SECONDARY TURRETMS02
      WeaponMuzzleFlash = SECONDARY TURRETMS02
    End

    

     ConditionState = REALLYDAMAGED
      Turret = TURRET
      WeaponFireFXBone  = PRIMARY TURRETMS01
      WeaponMuzzleFlash = PRIMARY TURRETMS01
      WeaponLaunchBone  = PRIMARY TURRETMS01
      WeaponRecoilBone  = PRIMARY BARREL
      WeaponFireFXBone  = SECONDARY TURRETMS02
      WeaponLaunchBone  = SECONDARY TURRETMS02
      WeaponMuzzleFlash = SECONDARY TURRETMS02
    End
     ConditionState = RUBBLE
      Turret = TURRET
      WeaponFireFXBone  = PRIMARY TURRETMS01
      WeaponMuzzleFlash = PRIMARY TURRETMS01
      WeaponLaunchBone  = PRIMARY TURRETMS01
      WeaponRecoilBone  = PRIMARY BARREL
      WeaponFireFXBone  = SECONDARY TURRETMS02
      WeaponLaunchBone  = SECONDARY TURRETMS02
      WeaponMuzzleFlash = SECONDARY TURRETMS02
    
    End
    TrackMarks = EXTnkTrack.tga
    TreadAnimationRate      = 2.0  ; amount of tread texture to move per second
  End
   

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:BMP-2
  Side                = Japan
  EditorSorting       = VEHICLE
  TransportSlotCount  = 3                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet 
    Conditions        = None 
    Weapon               = PRIMARY   30mm_2A42_EXP
    PreferredAgainst     = PRIMARY   VEHICLE INFANTRY
    Weapon               = SECONDARY 9M113_Konkurs
    PreferredAgainst     = SECONDARY VEHICLE STRUCTURE
  End
  ArmorSet
    Conditions           = None
    Armor                = Bmp2_Armor
    DamageFX             = TankDamageFX
  End
  VisionRange         = 470
  ShroudClearingRange = 380
  
  ExperienceValue     = 50 50 100 150    ;Experience point value at each level
  ExperienceRequired  = 0 100 150 300  ;Experience points needed to gain each level
  IsTrainable         = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet          = None
  ; *** AUDIO Parameters ***
  VoiceSelect           = CrusaderTankVoiceMove
  VoiceMove             = CrusaderTankVoiceMove
  VoiceGuard            = CrusaderTankVoiceMove
  VoiceAttack           = CrusaderTankVoiceAttack
  SoundMoveStart        = CrusaderTankMoveStart
  SoundMoveStartDamaged = CrusaderTankMoveStart
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate         = CrusaderTankVoiceCreate
    VoiceEnter             = CrusaderTankVoiceMove
    TurretMoveStart     = NoSound
    TurretMoveLoop      = TurretMoveLoop
    SoundEject          = PilotSoundEject
    VoiceEject          = PilotVoiceEject
    VoiceCrush          = CrusaderTankVoiceCrush
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority          = UNIT
  KindOf                 = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SCORE
  
  Body              = ActiveBody ModuleTag_02
    MaxHealth       = 900
    InitialHealth   = 900
  End
  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate       = 180
      ControlledWeaponSlots= PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor            = SET_NORMAL UTD-20_6cyl
  Behavior             = PhysicsBehavior ModuleTag_04
    Mass               = 300.0
  End
  Behavior = ProductionUpdate ModuleTag_07
    MaxQueueEntries = 1 ; So you can't build multiple upgrades in the same frame
  End
  ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_10
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier  = 80
    DestructionDelay  = 50
    DestructionDelayVariance  = 10
    FX  = INITIAL  FX_GenericTankDeathEffect
    OCL = MIDPOINT OCL_GenericTankDeathEffect
    FX  = FINAL    FX_GenericTankDeathExplosion
    OCL = FINAL    OCL_CrusaderTurret
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_11
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier  = 20
    DestructionDelay  = 2000
    DestructionDelayVariance  = 300
    FX  = INITIAL  FX_CrusaderCatchFire
    OCL = FINAL    OCL_GenericTankDeathEffect  
    FX  = FINAL    FX_GenericTankDeathExplosion
  End

  Behavior                 = TransitionDamageFX ModuleTag_12
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
  End

  Behavior = DestroyDie ModuleTag_13
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  ; A crushing defeat
  Behavior = FXListDie ModuleTag_14
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_TankCrush
  End

  Behavior = CreateObjectDie ModuleTag_15
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End

  Behavior = CreateCrateDie ModuleTag_CratesChange
   CrateData = SalvageCrateData=
  End
  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  Geometry               = BOX
  GeometryMajorRadius    = 15.0
  GeometryMinorRadius    = 10.0
  GeometryHeight         = 10.0     
  GeometryIsSmall        = Yes    
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length

End