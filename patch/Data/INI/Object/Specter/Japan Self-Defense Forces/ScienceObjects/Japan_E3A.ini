; SPECTER PATCH — Japan army kit (Specter Nato donor clone)
; Unique IDs only. Original Specter files untouched.


;----------------------------------------------------------------------------;
;-------------- Nato - Science E3A Sentry AWACS -----------------;
;------------------------ Code By Pcc Studios Team --------------------------;







;------------------------------------------------------------------------------
Object Japan_E3A

Scale = 0.9
  ; *** ART Parameters ***
  SelectPortrait         = us_e3g
  ButtonImage            = us_e3g
  Draw = W3DModelDraw ModuleTag_01
    DefaultConditionState
      Model               = US_E3G
      Animation           = US_E3G.US_E3G
      AnimationMode       = LOOP
      
      ParticleSysBone = Engine01 HighAltitudeJetContrail
      ParticleSysBone = Engine02 HighAltitudeJetContrail
      ParticleSysBone = Engine03 HighAltitudeJetContrail
      ParticleSysBone = Engine04 HighAltitudeJetContrail
      ;ParticleSysBone     = WingTip01 JetContrailThin
      ;ParticleSysBone     = WingTip02 JetContrailThin
    End
    ConditionState        = DAMAGED
      Model               = US_E3G
      Animation           = US_E3G.US_E3G
      AnimationMode       = LOOP
      ParticleSysBone     = Smoke01 JetFireLarge
      ParticleSysBone     = Smoke02 JetFireLarge
      ParticleSysBone     = Engine01 JetContrailThin ;JetBlackTrailThin
      ParticleSysBone     = Engine02 JetBlackTrailThin
      ParticleSysBone     = Engine03 JetContrailThin ;JetBlackTrailThin
      ParticleSysBone     = Engine04 JetBlackTrailThin
      ParticleSysBone     = Smoke01 JetSmokeLarge
      ParticleSysBone     = Smoke02 JetSmokeLarge
    End
    ConditionState        = REALLYDAMAGED
      Model               = US_E3G
      Animation           = US_E3G.US_E3G
      AnimationMode       = LOOP
      ParticleSysBone     = Smoke01 JetFireLarge
      ParticleSysBone     = Smoke02 JetFireLarge
      ParticleSysBone     = Engine01 JetBlackTrailThin
      ParticleSysBone     = Engine02 JetBlackTrailThin
      ParticleSysBone     = Engine03 JetBlackTrailThin
      ParticleSysBone     = Engine04 JetBlackTrailThin
      ParticleSysBone     = Smoke01 JetSmokeLarge
      ParticleSysBone     = Smoke02 JetSmokeLarge
    End
    ConditionState        = RUBBLE
      Model               = US_E3G
      Animation           = US_E3G.US_E3G
      AnimationMode       = LOOP
    End
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:E3A
  EditorSorting       = VEHICLE
  Side                = Japan
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)
  VisionRange           = 350.0 
  ShroudClearingRange   = 300.0 
  ArmorSet
    Conditions      = None
    Armor           = AirplaneArmor
    DamageFX        = None
  End
  WeaponSet
    Conditions = None
    Weapon = PRIMARY AN_APY2_SAR_SCANMODE
  End

  CommandSet        = E3G_CommandSet
  ExperienceValue = 200 200 200 200    ;Experience point value at each level
  IsTrainable = No ;Not Player built, so no veterancy

  ; *** AUDIO Parameters ***
  SoundAmbient = B52AmbientLoop
  SoundAmbientRubble    = NoSound

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = AIRCRAFT PRELOAD CAN_ATTACK SCORE SELECTABLE VEHICLE REVEALS_ENEMY_PATHS CAN_CAST_REFLECTIONS SCORE VEHICLE
  Body = ActiveBody ModuleTag_03
    MaxHealth       = 1000.0
    InitialHealth   = 1000.0
  End
   
  Behavior = PhysicsBehavior ModuleTag_Mass
    Mass = 300.0
  End

  Behavior = AIUpdateInterface ModuleTag_Select
    ForbidPlayerCommands = No
    AutoAcquireEnemiesWhenIdle = Yes
  End
  ;Locomotor = SET_PANIC  CMF56_2_Turbofan_engine_Orbit
  Locomotor = SET_NORMAL CMF56_2_Turbofan_engine


  Behavior = SpecialAbility ModuleTag_AWACSSP
    SpecialPowerTemplate = SuperweaponNatoAWACS
    UpdateModuleStartsAttack = Yes
  End

  Behavior = SpectreGunshipUpdate ModuleTag_Loiter
    SpecialPowerTemplate = SuperweaponNatoAWACS
    ; RandomOffsetForHowitzer = 22 ; not used, ignore it
    TargetingReticleRadius = 30 ; not used, ignore it
    OrbitInsertionSlope = 0.7 ; steepness of orbit entry
    GunshipOrbitRadius = 400 ; overall radius of the orbiting
    HowitzerFiringRate = 300 ; not used, ignore it
    HowitzerFollowLag = 400 ; not used, ignore it
    StrafingIncrement = 20 ; not used, ignore it
    AttackAreaRadius = 400 ; not used, ignore it
    OrbitTime = 125000 ;in msec
  End
  Behavior = PointDefenseLaserUpdate ModuleTag_ALQ135
    WeaponTemplate        = AN/ALQ-135
    PrimaryTargetTypes    = PROJECTILE INERT
    ScanRate              = 900
    ScanRange             = 450
    PredictTargetVelocityFactor = 3.0
  End
  Behavior = PointDefenseLaserUpdate ModuleTag_COMSPOT
    WeaponTemplate        = AWACS_BaseMonaitoring
    PrimaryTargetTypes    = COMMANDCENTER
    ScanRate              = 1000
    ScanRange             = 5000
    PredictTargetVelocityFactor = 3.0
  End
  Behavior                          = JetSlowDeathBehavior ModuleTag_v310
    DestructionDelay                = 15000
    RollRate                        = 0.1
    RollRateDelta                   = 1%    ;each frame, rollrate = rollrate * rollrateDelta
    PitchRate                       = 0.0
    FallHowFast                     = 80.0%    ;Bigger is faster (can be over 100%,it's a fraction of gravity)
    FXInitialDeath                  = FX_JetBigDeathInitial
    OCLInitialDeath                 = OCL_AmericaJetCargoDeathStart
    DelaySecondaryFromInitialDeath  = 2000       ; in milliseconds
    OCLSecondary                    = OCL_AmericaJetCargoHulkDeath
    FXSecondary                     = FX_BigPlaneDeath
    FXHitGround                     = FX_BigJetDeathHitGround
    FXFinalBlowUp                   = FX_JetDeathFinalBlowUp
    DelayFinalBlowUpFromHitGround   = 1000
    OCLFinalBlowUp                  = OCL_AmericaJetB52DeathFinalBlowUp
;   DeathLoopSound                  = MICAL NEEDS TO MAKE ME
  End

  Behavior = TransitionDamageFX ModuleTag_11
  End

  Behavior                = CountermeasuresBehavior ModuleTag_1dff30
    TriggeredBy           = Upgrade_AmericaCountermeasures
    FlareTemplateName     = CountermeasureFlare
    FlareBoneBaseName     = Flare ; Name of the base flare bone (Flare01, Flare02, Flare03)
    VolleySize            = 2     ; Number of flares launched per volley (requires bones)
    VolleyArcAngle        = 190.0  ; Max angle of flare relative to forward direction (with VolleySize of 1, flare will always goes straight back).
    VolleyVelocityFactor  = 4.0   ; Shoots out flares at a stronger velocity with a higher value.
    DelayBetweenVolleys   = 150  ; Time between flare volleys
    NumberOfVolleys       = 6     ; Number of times the volleys will fire before reloading
    ReloadTime            = 1500     ; After all volleys launched, then reloading must occur. If 0, then reloading occurs at airstrip only.
    EvasionRate           = 75%   ; With active flares, the specified percentage will be diverted.
    ReactionLaunchLatency = 100     ; Reaction between getting shot at and the firing of the first volley of countermeasures.
    MissileDecoyDelay     = 200   ; A reported missile that has been determined to hit a decoy will wait this long before acquiring countermeasures.
  End

  Behavior = StealthDetectorUpdate ModuleTag_16f6
    DetectionRate   = 1800   ; how often to rescan for stealthed things in my sight (msec)
    DetectionRange = 1000 ;Dustin, enable this for independant balancing!
    CanDetectWhileGarrisoned  = No ;Garrisoned means being in a structure that you units can shoot out of.
    CanDetectWhileContained   = No ;Contained means being in a transport or tunnel network.
    ExtraForbiddenKindOf = UNATTACKABLE
  End
  Behavior           = OCLSpecialPower ModuleTag_SSM
    SpecialPowerTemplate = Superweapon_ANAPY2_SARSCANMODE
    OCL                  = SUPERWEAPON_ANAPY2_SARSCAN
    CreateLocation       = CREATE_AT_EDGE_NEAR_SOURCE ;CREATE_AT_EDGE_FARTHEST_FROM_TARGET
  End
  Behavior                    = FireWeaponUpdate ModuleTag_FCSSP
    Weapon                    = AN_APY2_Radar_Power
    ExclusiveWeaponDelay      = 1000
  End

;---------- Radar Signature --------------- ;
  Behavior = FireWeaponWhenDamagedBehavior ModuleTag_RS
    StartsActive                = Yes
    ReactionWeaponPristine      = RadarWaveEmitter
    ReactionWeaponDamaged       = RadarWaveEmitter
    ReactionWeaponReallyDamaged = RadarWaveEmitter
    ReactionWeaponRubble        = RadarWaveEmitter
    DamageTypes                 = NONE +MICROWAVE
  End
;---------- End Of Radar Signature ----------;
  Geometry = Box
  GeometryIsSmall = No
  GeometryMajorRadius = 60.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 10.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length

End