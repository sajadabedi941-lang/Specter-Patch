Object NorthKorea_Sam8
; PatchBaseCost = 1200
; PatchBaseTime = 12.0
; CountryBalance side=NorthKorea origin=Domestic tech=AdvancedAirDefense cat=AirDefense key=UnitCostMult rating=Low cost×0.5628 time×0.8551 => 675 / 10.3s























 ; *** ART Parameters ***
  SelectPortrait         = irq_sam8
  ButtonImage            = irq_sam8
  Draw = W3DTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = Irq_9K33
      Animation      = Irq_9K33.Irq_9K33
      AnimationMode   = LOOP
      Turret = Turret
      WeaponFireFXBone = PRIMARY MUZZILE
      WeaponLaunchBone = PRIMARY MUZZILE
    End
    
    ConditionState = REALLYDAMAGED
      Model = Irq_9K33
      Animation      = Irq_9K33.Irq_9K33
      AnimationMode   = LOOP
      Turret = Turret
      WeaponFireFXBone = PRIMARY MUZZILE
      WeaponLaunchBone = PRIMARY MUZZILE
    End
    
    ConditionState = RUBBLE
      Model = Irq_9K33
    End

    TrackMarks = EXTireTrack.tga

    Dust                        = RocketBuggyDust
    DirtSpray                   = RocketBuggyDirtSpray
    PowerslideSpray             = RocketBuggyDirtPowerSlide

    ; These parameters are only used if the model has a separate suspension, 
    ; and the locomotor has HasSuspension = Yes.
    LeftFrontTireBone           = Tire01
    RightFrontTireBone          = Tire02
    LeftRearTireBone            = Tire03
    RightRearTireBone           = Tire04
    TireRotationMultiplier      = 0.2   ; this * speed = rotation.
    PowerslideRotationAddition  = 2.5   ; This speed is added to the rotation speed when powersliding.

  End
  ; --- Indicator
  Draw = W3DModelDraw ModuleTag_Indicator
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = Spec_Indic_ABM
    End
    ConditionState = DYING
      Model = None
    End
  End


  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:Sam8
  Side                = NorthKorea
  MaxSimultaneousOfType = 10
  MaxSimultaneousLinkKey = Patch_AirDefense  ; SPECTER PATCH global limit
  EditorSorting   = VEHICLE
  TransportSlotCount = 3                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions         = None 
     Weapon            = PRIMARY   9K33_ABM
  End

  Prerequisites
    Object = NorthKorea_SupplyCenter
  End

  ArmorSet
    Conditions      = None
    Armor           = AATruckArmor
    DamageFX        = TankDamageFX
  End
  BuildCost           = 675
  BuildTime           = 10.3          ;in seconds    
  VisionRange     = 670
  ShroudClearingRange = 160
  
  ExperienceValue     = 100 100 200 400    ;Experience point value at each level
  ExperienceRequired  = 0 200 400 800  ;Experience points needed to gain each level
  IsTrainable         = Yes             ;Can gain experience

  CrusherLevel        = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel      = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet           = GenericTankCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = RadarVanVoiceSelect
  VoiceMove = RadarVanVoiceMove
  VoiceAttack = RadarVanVoiceMove
;  SoundMoveStart = RadarVanMoveStart
;  SoundMoveStartDamaged = RadarVanMoveStart
  SoundMoveLoop = ConvoyTruckMoveLoop
  SoundMoveLoopDamaged = ConvoyTruckMoveLoop

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = RadarVanVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop = TurretMoveLoop  
  ; Required for the W3DTruckDraw module
    TruckLandingSound = NoSound ;RocketBuggyLand
    TruckPowerslideSound = NoSound ;RocketBuggyPowerslide
    VoiceCrush      = RadarVanVoiceCrush
    VoiceEnter = RadarVanVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK DONT_AUTO_CRUSH_INFANTRY ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SALVAGER SCORE
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 200.0
    InitialHealth   = 200.0
    SubdualDamageCap = 600
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = AIUpdateInterface ModuleTag_0A3F3
    Turret
      TurretTurnRate = 360
      ControlledWeaponSlots = PRIMARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 1
  End
  Behavior = CommandButtonHuntUpdate  ModuleTag_0A3T3HJ4 ; allows use of command button hunt script with this unit. 
  End
  Locomotor = SET_NORMAL Generic8x8Locomotor
  Behavior = PhysicsBehavior ModuleTag_05JVY
    Mass = 100.0
  End
  Behavior = TransitionDamageFX ModuleTag_08
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_ScudLauncherDamageTransition
  End
  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_VH605
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 5
    ModifierBonusPerOverkillPercent = 20%  ; negative means less likely to pick this in the face of much damage, positive means more likely
    DestructionDelay = 0
    FX = INITIAL FX_BuggyNewDeathExplosion
    OCL = FINAL OCL_RocketBuggyAirDeathStart
  End

  ; A crushing defeat
  Behavior = FXListDie ModuleTag_1VJ66U0
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  Behavior = CreateObjectDie ModuleTag_V61168
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End

  Behavior = FlammableUpdate ModuleTag_621JG
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = DestroyDie ModuleTag_25J2GJ5
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  Behavior                    = StealthDetectorUpdate ModuleTag_StealthDetection_Radar_Missiles
    DetectionRate             = 600
    DetectionRange            = 390
    ExtraForbiddenKindOf      = AIRCRAFT INFANTRY VEHICLE
    CanDetectWhileGarrisoned  = No
    CanDetectWhileContained   = No
  End
  Behavior = FireWeaponUpdate ModuleTag_Radar
    Weapon = 9K33_Radar_Power
  End
  Geometry = BOX
  GeometryMajorRadius = 44.0
  GeometryMinorRadius = 20.0
  GeometryHeight = 19.5     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME   
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length 

End