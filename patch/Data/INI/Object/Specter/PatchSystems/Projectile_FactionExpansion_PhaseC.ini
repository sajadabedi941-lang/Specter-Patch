; ============================================================
; Phase C — Unique projectiles for expansion faction weapons
; NO NAVAL. Unique Object IDs. Multiplayer-safe guidance params.
; ============================================================

Object Ukraine_Grad_Projectile

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ConditionState
      Model = 122mmGrad
      ParticleSysBone = Engine01 UnguidedRocketEngineTrailLong ;UnguidedRocketEngineTrail
      ParticleSysBone = Engine01 AGM_MissileFlare ;UnguidedRocketEngineFlare
      ParticleSysBone = Engine01 AGM_MissileLenzFlare
    End
    ConditionState = POWER_PLANT_UPGRADED
      Model = 122mmGrad
      ;ParticleSysBone = Engine01 UnguidedRocketEngineFlare
      ;ParticleSysBone = Engine01 AGM_MissileLenzFlare
      ;ParticleSysBone = Engine01 JetContrail
    End
  End
  ; *** AUDIO parameters ***
  SoundAmbient = MissilesIncomingWhistle

  ; ***DESIGN parameters ***
  DisplayName       = OBJECT:Ukraine_Grad_Projectile
  EditorSorting   = SYSTEM
  VisionRange = 0.0
  ArmorSet
    Conditions      = None
    Armor           = GenericUnguidedProjectileArmor
    DamageFX        = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE UNATTACKABLE
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 113.0
    InitialHealth   = 113.0
  End

; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +DETONATED
    ; we detonated normally.
    ; no FX, just quiet destroy ourselves
  End
  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = NONE +LASERED
    ; shot down by laser.
    FX         = FX_GenericMissileDisintegrate
    OCL        = OCL_GenericMissileDisintegrate
  End
  Behavior = InstantDeathBehavior DeathModuleTag_03
    DeathTypes = ALL -LASERED -DETONATED
    ; shot down by nonlaser.
    FX         = FX_GenericMissileDeath
    Weapon     = FX_UnguidedRocketExplosion
  End
; ---- end Projectile death behaviors
  Behavior = PhysicsBehavior ModuleTag_06
    Mass = 1.0
  End
  Behavior = PowerPlantUpgrade ModuleTag_IBK
    TriggeredBy = Upgrade_ICBM_BoosterKiller
  End
  Behavior = PowerPlantUpdate ModuleTag_IBKT
    RodsExtendTime = 900
  End
  Behavior = DumbProjectileBehavior ModuleTag_04
    FirstHeight = 240  ; Height of Bezier control points above highest intervening terrain
    SecondHeight = 160
    FirstPercentIndent = 85% ; Percentage of shot distance control points are placed
    SecondPercentIndent = 65%
    FlightPathAdjustDistPerSecond   = 0 ; Can allow a max speed this can attempt to follow a target. Units are their velocity we can tag.
  End
  Geometry = Cylinder
  GeometryMajorRadius = 2.0
  GeometryHeight = 3.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
End

