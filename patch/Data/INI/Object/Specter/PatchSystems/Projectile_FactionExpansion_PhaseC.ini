; ============================================================
; Phase C — Unique projectiles for expansion faction weapons
; NO NAVAL. Unique Object IDs. Multiplayer-safe guidance params.
; ============================================================

Object America_Projectile_AIM120D_F22

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ConditionState
      Model = US_AIM120
      ParticleSysBone = Engine01 Spec_GenericMissileFlare
      ParticleSysBone = Engine01 SmokelessMissileExhaust
    End
    ConditionState = POWER_PLANT_UPGRADED
      Model = US_AIM120
    End
  End

  ; ***DESIGN parameters ***
  DisplayName       = OBJECT:America_Projectile_AIM120D_F22
  EditorSorting     = SYSTEM
  VisionRange = 0.0  

  ArmorSet
    Conditions      = None
    Armor           = LightBVRAntiAirMissileArmor
    DamageFX        = None
  End
  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD CAN_CAST_REFLECTIONS PROJECTILE SMALL_MISSILE
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 115.0
    InitialHealth   = 115.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    ; A projectile is not disabled, but instead loses target and scatters
    SubdualDamageCap = 120
    SubdualDamageHealRate = 10000
    SubdualDamageHealAmount = 50
  End

; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +DETONATED
    ; we detonated normally.
    ; no FX, just quiet destroy ourselves
  End
  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = NONE +LASERED
    ; shot down by laser.
    FX         = FX_GenericMissileDisintegrate
    OCL        = OCL_GenericMissileDisintegrate
  End
  Behavior = InstantDeathBehavior DeathModuleTag_03
    DeathTypes = ALL -LASERED -DETONATED
    ; shot down by nonlaser.
    FX         = FX_GenericMissileDeath
  End
; ---- end Projectile death behaviors

  Behavior = PhysicsBehavior ModuleTag_07
    Mass = 1
  End
  Behavior = PowerPlantUpgrade ModuleTag_IBK
    TriggeredBy = Upgrade_ICBM_BoosterKiller
  End
  Behavior = PowerPlantUpdate ModuleTag_IBKT
    RodsExtendTime = 1100
  End
  Behavior = MissileAIUpdate ModuleTag_08
    TryToFollowTarget     = Yes 
    FuelLifetime          = 2200
    InitialVelocity       = 146                ; in dist/sec
    IgnitionDelay         = 65
    IgnitionFX            = FX_JetMissileIgnition
    DistanceToTravelBeforeTurning = 2
    DistanceToTargetBeforeDiving = 280
  End
  Locomotor = SET_NORMAL AIM-120CLocomotor

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0

End

