; SPECTER PATCH - Science-spawn AWACS balance overlay (RUS_A50_AWACS)
; Improves radar/survivability for stock OCL Superweapon AWACS. Does not remove stock unit.


Object RUS_A50_AWACS

Scale = 0.75

  SelectPortrait         = us_e3g
  ButtonImage            = us_e3g
  Draw = W3DModelDraw ModuleTag_01
    DefaultConditionState
      Model               = US_E3G
      Animation           = US_E3G.US_E3G
      AnimationMode       = LOOP
      ParticleSysBone = Engine01 HighAltitudeJetContrail
      ParticleSysBone = Engine02 HighAltitudeJetContrail
      ParticleSysBone = Engine03 HighAltitudeJetContrail
      ParticleSysBone = Engine04 HighAltitudeJetContrail
    End
    ConditionState        = DAMAGED
      Model               = US_E3G
      Animation           = US_E3G.US_E3G
      AnimationMode       = LOOP
      ParticleSysBone     = Smoke01 JetFireLarge
      ParticleSysBone     = Engine01 JetContrailThin
      ParticleSysBone     = Engine02 JetBlackTrailThin
      ParticleSysBone     = Smoke01 JetSmokeLarge
    End
    ConditionState        = REALLYDAMAGED
      Model               = US_E3G
      Animation           = US_E3G.US_E3G
      AnimationMode       = LOOP
      ParticleSysBone     = Smoke01 JetFireLarge
      ParticleSysBone     = Engine01 JetBlackTrailThin
      ParticleSysBone     = Engine02 JetBlackTrailThin
      ParticleSysBone     = Smoke01 JetSmokeLarge
    End
    ConditionState        = RUBBLE
      Model               = US_E3G
      Animation           = US_E3G.US_E3G
      AnimationMode       = LOOP
    End
    OkToChangeModelColor = Yes
  End

  DisplayName         = OBJECT:RUS_A50_AWACS
  EditorSorting       = VEHICLE
  Side                = Russia
  TransportSlotCount  = 0
  ; Strategic radar picture — large battlefield awareness
  VisionRange           = 900.0
  ShroudClearingRange   = 1100.0
  ArmorSet
    Conditions      = None
    Armor           = AirplaneArmor
    DamageFX        = None
  End
  WeaponSet
    Conditions = None
    Weapon = PRIMARY AN_APY2_SAR_SCANMODE
  End
  CommandSet        = E3G_CommandSet
  ExperienceValue = 350 350 350 350
  IsTrainable = Yes
  SoundAmbient = B52AmbientLoop
  SoundAmbientRubble    = NoSound

  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT REVEALS_ENEMY_PATHS
  Body = ActiveBody ModuleTag_03
    MaxHealth       = 1800.0
    InitialHealth   = 1800.0
  End
  Behavior = PhysicsBehavior ModuleTag_Mass
    Mass = 280.0
  End
  Behavior = JetAIUpdate ModuleTag_07
    OutOfAmmoDamagePerSecond  = 3%
    TakeoffDistForMaxLift     = 0%
    TakeoffPause              = 500
    MinHeight                 = 5
    ParkingOffset             = 5
    ReturnToBaseIdleTime      = 12000
  End
  ; Slightly faster support jet (was CMF56_2_Turbofan_engine)
  Locomotor = SET_NORMAL F100_PW_229
  Locomotor = SET_TAXIING BasicJetTaxiLocomotor

  ; Limited stealth detection (improved scan rate + range)
  Behavior = StealthDetectorUpdate ModuleTag_16f6
    DetectionRate   = 900
    DetectionRange = 1600
    CanDetectWhileGarrisoned  = No
    CanDetectWhileContained   = No
    ExtraForbiddenKindOf = UNATTACKABLE
  End
  Behavior = PointDefenseLaserUpdate ModuleTag_ALQ135
    WeaponTemplate        = AN/ALQ-135
    PrimaryTargetTypes    = PROJECTILE INERT
    ScanRate              = 700
    ScanRange             = 550
    PredictTargetVelocityFactor = 3.0
  End
  Behavior = FireWeaponUpdate ModuleTag_FCSSP
    Weapon                    = AN_APY2_Radar_Power
    ExclusiveWeaponDelay      = 800
  End
  Behavior                          = JetSlowDeathBehavior ModuleTag_v310
    DestructionDelay                = 15000
    RollRate                        = 0.1
    RollRateDelta                   = 1%
    PitchRate                       = 0.0
    FallHowFast                     = 80.0%
    FXInitialDeath                  = FX_JetBigDeathInitial
    OCLInitialDeath                 = OCL_AmericaJetCargoDeathStart
    DelaySecondaryFromInitialDeath  = 2000
    OCLSecondary                    = OCL_AmericaJetCargoHulkDeath
    FXSecondary                     = FX_BigPlaneDeath
    FXHitGround                     = FX_BigJetDeathHitGround
    FXFinalBlowUp                   = FX_JetDeathFinalBlowUp
    DelayFinalBlowUpFromHitGround   = 1000
    OCLFinalBlowUp                  = OCL_AmericaJetB52DeathFinalBlowUp
  End
  Behavior = ProductionUpdate ModuleTag_Prod
  End
  Behavior = TransitionDamageFX ModuleTag_11
  End
  Behavior = CountermeasuresBehavior ModuleTag_CM
    TriggeredBy           = Upgrade_AmericaCountermeasures
    FlareTemplateName     = CountermeasureFlare
    FlareBoneBaseName     = Flare
    VolleySize            = 4
    VolleyArcAngle        = 90.0
    VolleyVelocityFactor  = 5.0
    DelayBetweenVolleys   = 140
    NumberOfVolleys       = 5
    ReloadTime            = 1400
    EvasionRate           = 50%
    ReactionLaunchLatency = 0
    MissileDecoyDelay     = 50
  End

  Geometry = Box
  GeometryIsSmall = No
  GeometryMajorRadius = 45.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 10.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End
