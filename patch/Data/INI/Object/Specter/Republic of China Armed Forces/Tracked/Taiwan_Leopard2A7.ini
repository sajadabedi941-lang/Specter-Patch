; SPECTER PATCH — Taiwan army kit (Specter Nato donor clone)
; Unique IDs only. Original Specter files untouched.


;----------------------------------------------------------------------------;
;-------------- NATO Armed Forces - Land Forces System -----------------;
;------------------------ Code By Pcc Studios Team --------------------------;








;------------------------------------------------------------------------------
Object Taiwan_TankLeopard2A7Plus
Scale = 0.95
  ; *** ART Parameters ***
  SelectPortrait         = Nat_leo2a7
  ButtonImage            = Nat_leo2a7
  Draw = W3DOverlordTankDraw ModuleTag_01
    ExtraPublicBone = FIREPOINT01
    ExtraPublicBone = Laser
    DefaultConditionState
      Model               = NAT_L2A7V
      Turret              = Turret
      WeaponFireFXBone    = PRIMARY turretms01
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY turretms01
      WeaponLaunchBone    = PRIMARY turretms01
      WeaponFireFXBone    = SECONDARY TURRETMS02
      WeaponMuzzleFlash   = SECONDARY TURRETMS02
      WeaponLaunchBone    = SECONDARY TURRETMS02
      WeaponFireFXBone    = TERTIARY TURRETMS01
      WeaponLaunchBone    = TERTIARY TURRETMS01
    End
    ConditionState       = REALLYDAMAGED
      Model              = NAT_L2A7VD
    End
    ConditionState       = RUBBLE
      Model              = NAT_L2A7VR
    End
    TrackMarks           = EXTnkTrack.tga
    TreadAnimationRate      = 2.0  ; amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
    OkToChangeModelColor = Yes
  End
  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:L2A7
  Side                = Taiwan
  EditorSorting       = VEHICLE
  TransportSlotCount  = 3                 ;how many "slots" we take in a transport (0 == not transportable)
  WeaponSet
    Conditions           = None 
    Weapon               = PRIMARY     120mm_L-44_M256A3
    Weapon               = SECONDARY   7_62mm_Coxail_M240M
    Weapon               = TERTIARY    120mm_L-44_M256A3_HE
    AutoChooseSources    = TERTIARY    None
  End
  ArmorSet
    Conditions        = None
    Armor             = T14_Armata_Armor
    DamageFX          = TankDamageFX
  End
  BuildCost       = 2000
  BuildTime       = 15.0          ;in seconds    
  VisionRange     = 533
  ShroudClearingRange = 425
  ExperienceValue = 200 200 400 600   ;Experience point value at each level
  ExperienceRequired = 0 400 600 1200  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet = GenericAmericaMainbBattleTankCommandSet
  ; *** AUDIO Parameters ***
  VoiceSelect           = CrusaderTankVoiceSelect
  VoiceMove             = CrusaderTankVoiceMove
  VoiceGuard            = CrusaderTankVoiceMove
  VoiceAttack           = CrusaderTankVoiceAttack
  SoundMoveStart        = CrusaderTankMoveStart
  SoundMoveStartDamaged = CrusaderTankMoveStart
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate         = CrusaderTankVoiceCreate
    VoiceEnter             = CrusaderTankVoiceMove
    TurretMoveStart     = NoSound
    TurretMoveLoop      = TurretMoveLoop
    SoundEject          = PilotSoundEject
    VoiceEject          = PilotVoiceEject
    VoiceCrush          = CrusaderTankVoiceCrush
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SCORE
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 1440
    InitialHealth   = 1440
    SubdualDamageCap = 2200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = TransportAIUpdate ModuleTag_03
    Turret
      TurretTurnRate       = 180 ;60   // turn rate, in degrees per sec
      ControlledWeaponSlots= PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate        = 1
  End
  Locomotor   = SET_NORMAL ChTZ_12N360_A85_3A
  Behavior = PhysicsBehavior ModuleTag_04
    Mass      = 500.0
  End
  Behavior = PointDefenseLaserUpdate ModuleTag_Afghanit
    WeaponTemplate        = Afghanit_APS_T14
    PrimaryTargetTypes    = SMALL_MISSILE PROJECTILE
    ScanRate              = 880
    ScanRange             = 210
    PredictTargetVelocityFactor = 3.0
  End
  Behavior = OverlordContain ModuleTag_RCWS
    Slots                   = 1
    DamagePercentToUnits    = 100%
    AllowInsideKindOf       = PORTABLE_STRUCTURE
    PassengersAllowedToFire = Yes
    PassengersInTurret      = Yes ; My passengers ride in my turret, that's where the Firepoint bones are
    ExperienceSinkForRider  = Yes ; I get the Exp for things my turret friend kills
    PayloadTemplateName     = America_RCWS
  End
 ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_10
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier  = 50
    DestructionDelay  = 5000
    DestructionDelayVariance  = 100
    FX  = INITIAL  FX_GenericTankAmmoCockoff
    OCL = MIDPOINT OCL_T14DeathEffect
    FX  = FINAL    FX_GenericFreeFallBombsExplosion
    ;OCL = FINAL    OCL_CrusaderTurret
  End
  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_11
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier  = 50
    DestructionDelay  = 4900
    DestructionDelayVariance  = 300
    FX  = INITIAL  FX_GenericTankAmmoCockoff
    OCL = FINAL    OCL_T14DeathEffect
    FX  = FINAL    FX_UnguidedRocketExplosion
  End
  Behavior                 = TransitionDamageFX ModuleTag_12
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  Behavior = DestroyDie ModuleTag_13
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  ; A crushing defeat
  Behavior = FXListDie ModuleTag_14
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_15
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End
  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  Geometry               = BOX
  GeometryMajorRadius    = 25.0
  GeometryMinorRadius    = 20.0
  GeometryHeight         = 10.0     
  GeometryIsSmall        = Yes    
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End