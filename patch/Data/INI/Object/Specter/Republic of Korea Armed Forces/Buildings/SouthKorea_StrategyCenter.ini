Object SouthKorea_StrategyCenter
; PatchBaseCost = 2500
; PatchBaseTime = 60.0
; CountryBalance side=SouthKorea origin=Domestic tech=Standard cat=Building key=UnitCostMult rating=High cost×0.9044 time×0.7776 => 2261 / 46.7s
