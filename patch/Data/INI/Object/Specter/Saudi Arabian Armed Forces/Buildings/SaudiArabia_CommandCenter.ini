;==============================================================================
; SPECTER PATCH - Phase 1 structure scaffold
; Compatible overlay for Generals Zero Hour Specter mod.
; Does NOT modify original Specter archives.
; Method: Iraq-copy (same pattern as FactionNorthKorea).
; Status: STRUCTURE ONLY - unit/building content TBD in later phases.
;==============================================================================
;-------------- Saudi Arabian Armed Forces - Buildings -----------------;
; Iraq-copy method: CommandCenter object renamed for StartingBuilding.

Object SaudiArabia_CommandCenter
; PHASE1_STUB: full modules will be copied from Iraq_CommandCenter in a later phase.
; This stub exists so PlayerTemplate StartingBuilding resolves.
Scale = 0.9
  SelectPortrait         = irq_comndcntr
  ButtonImage            = irq_comndcntr

  Draw                   = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model              = Irq_Command
      Animation          = Irq_Command.Irq_Command
      AnimationMode      = LOOP
    End
  End

  DisplayName         = OBJECT:CommandCenter
  Side                = SaudiArabia
  EditorSorting       = STRUCTURE
  BuildCost           = 2000
  BuildTime           = 4.0
  EnergyProduction    = 0
  CommandSet          = SaudiArabia_CommandCenterCommandSet
  VisionRange         = 300.0
  ShroudClearingRange = 300
  ArmorSet
    Conditions        = None
    Armor             = StructureArmorTough
    DamageFX          = StructureDamageFXNoShake
  End
  ExperienceValue     = 200 200 200 200

  KindOf              = PRELOAD STRUCTURE SELECTABLE IMMOBILE COMMANDCENTER SCORE CAPTURABLE FS_FACTORY AUTO_RALLYPOINT MP_COUNT_FOR_VICTORY
  Body                = StructureBody ModuleTag_02
    MaxHealth         = 2000.0
    InitialHealth     = 2000.0
  End
  Behavior = PreorderCreate ModuleTag_PreorderCreate
  End
  Behavior = ProductionUpdate ModuleTag_03
  End
  Behavior = DefaultProductionExitUpdate ModuleTag_04
    UnitCreatePoint   = X:-80.0  Y:55.0 Z:0.0
    NaturalRallyPoint = X:60.0  Y:35.0 Z:0.0
  End
  Geometry = BOX
  GeometryMajorRadius = 60.0
  GeometryMinorRadius = 60.0
  GeometryHeight = 30.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  BuildCompletion = PLACE_ON_GROUND
End
