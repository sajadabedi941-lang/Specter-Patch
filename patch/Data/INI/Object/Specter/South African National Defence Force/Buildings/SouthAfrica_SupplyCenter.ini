;------------------------------------------------------------------------------
Object SouthAfrica_SupplyCenter
Scale = 0.9
  ; *** ART Parameters ***
  SelectPortrait         = irq_money
  ButtonImage            = irq_money
  ;UpgradeCameo1 = Upgrade_AmericaSupplyLines
  Draw = W3DModelDraw ModuleTag_0741
    OkToChangeModelColor = Yes
    ; day **************************************
    ConditionState       = NONE
      Model              = Iraq_Supply
      Animation          = Iraq_Supply.Iraq_Supply
      AnimationMode      = LOOP
    End
    ConditionState       = DAMAGED
      Model              = Iraq_Supply
      Animation          = Iraq_Supply.Iraq_Supply
      AnimationMode      = LOOP
      ParticleSysBone    = Smoke01 SmolderingSmoke
      ParticleSysBone    = Smoke02 SmolderingSmoke
      ParticleSysBone    = Smoke03 SmolderingSmoke
      ParticleSysBone    = Smoke04 SmolderingSmoke
      ParticleSysBone    = Smoke01 SmolderingFire
      ParticleSysBone    = Smoke02 SmolderingFire
      ParticleSysBone    = Smoke03 SmolderingFire
      ParticleSysBone    = Smoke04 SmolderingFire
    End
     ConditionState      = REALLYDAMAGED RUBBLE
      Model              = Iraq_Supply
      Animation          = Iraq_Supply.Iraq_Supply
      AnimationMode      = LOOP
      ParticleSysBone    = Smoke01 SmolderingSmoke
      ParticleSysBone    = Smoke02 SmolderingSmoke
      ParticleSysBone    = Smoke03 SmolderingSmoke
      ParticleSysBone    = Smoke04 SmolderingSmoke
      ParticleSysBone    = Smoke05 SmolderingSmoke
      ParticleSysBone    = Smoke06 SmolderingSmoke
      ParticleSysBone    = Smoke01 SmolderingFire
      ParticleSysBone    = Smoke02 SmolderingFire
      ParticleSysBone    = Smoke03 SmolderingFire
      ParticleSysBone    = Smoke04 SmolderingFire
      ParticleSysBone    = Smoke05 SmolderingFire
      ParticleSysBone    = Smoke06 SmolderingFire
   End
  End
  PlacementViewAngle = -45
  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:SupplyCenter
  Side                = SouthAfrica
  EditorSorting       = STRUCTURE
  Prerequisites
    Object = SouthAfrica_PowerPlant
  End
  BuildCost           = 1000
  RefundValue         = 4000 ; With nothing (or zero) listed, we sell for half price. 
  BuildTime           = 10.0           ; in seconds
  EnergyProduction    = -1
  CommandSet          = SouthAfrica_SupplyCenterCommandSet
  VisionRange         = 300.0           ; Shroud clearing distance
  ShroudClearingRange = 300
  ArmorSet
    Conditions        = None
    Armor             = StructureArmor
    DamageFX          = StructureDamageFXNoShake
  End
  ExperienceValue     = 200 200 200 200  ; Experience point value at each level
  ; *** AUDIO Parameters ***
  VoiceSelect = SupplyCenterGLASelect
  SoundOnDamaged        = BuildingDamagedStateLight
  SoundOnReallyDamaged  = BuildingDestroy
  UnitSpecificSounds
    UnderConstruction     = UnderConstructionLoop
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority       = STRUCTURE
  KindOf              = PRELOAD STRUCTURE SELECTABLE IMMOBILE CASH_GENERATOR CAPTURABLE AUTO_RALLYPOINT MP_COUNT_FOR_VICTORY SCORE_CREATE CANNOT_BUILD_NEAR_SUPPLIES FS_SUPPLY_CENTER
  Body                = StructureBody ModuleTag_0744
    MaxHealth       = 1000.0
    InitialHealth   = 1000.0
    SubdualDamageCap = 2200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End
  Behavior = SupplyCenterCreate ModuleTag_0745
    ;nothing
  End
  Behavior = DestroyDie ModuleTag_0747
    ;nothing
  End
  Behavior                 = CreateObjectDie ModuleTag_0748
    CreationList      = OCL_SmallStructureDebris
  End
  Behavior                 = FXListDie ModuleTag_0749
    DeathFX           = FX_StructureSmallDeath
  End
  Behavior = ProductionUpdate ModuleTag_1240
    ; nothing
  End
  Behavior = SupplyCenterProductionExitUpdate ModuleTag_11
    UnitCreatePoint   = X:  0.0  Y:  0.0   Z:0.0
    NaturalRallyPoint = X: 36.0  Y:  0.0   Z:0.0;NaturalRallyPointX must always match GeometryMajorRadius! -ML
  End
  Behavior            = SpawnBehavior ModuleTag_12
    SpawnNumber       = 1
    SpawnReplaceDelay = 9999
    SpawnTemplateName = SouthAfrica_Ural375_Supply
    OneShot           = Yes
    CanReclaimOrphans = No
    SlavesHaveFreeWill = Yes
  End
  Behavior = SupplyCenterDockUpdate ModuleTag_13
    AllowsPassthrough = No ;You can't drive through this guy while docking.  Use this when the dock points are all outside
    NumberApproachPositions = 4 ; This is a Boneless dock, so this means infinite can approach
  End
  Behavior = FlammableUpdate ModuleTag_15
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 5       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  Behavior = TransitionDamageFX ModuleTag_16
    ;-------------DESIGNED FOR SMALL SIZED FACTION BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1       = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionSmallExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionSmallShockwave
  End
  ;Dont forget to edit the GLA Hole geometry for this object too
  Geometry            = BOX
  GeometryMajorRadius = 36.0
  GeometryMinorRadius = 35.0
  GeometryHeight      = 30.0
  GeometryIsSmall     = No
  ;FactoryExtraBibWidth= 1.0     ; extra placement border.
  Shadow              = SHADOW_VOLUME
  BuildCompletion     = PLACED_BY_PLAYER
End
