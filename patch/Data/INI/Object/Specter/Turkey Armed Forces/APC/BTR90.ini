    Turret
      TurretTurnRate = 160
      TurretPitchRate = 360
      AllowsPitch = Yes
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor            = SET_NORMAL TCD_510diesel
  Behavior             = PhysicsBehavior ModuleTag_0s4f4
    Mass               = 300.0
  End
  Behavior = ProductionUpdate ModuleTag_07s4f
    MaxQueueEntries = 1 ; So you can't build multiple upgrades in the same frame
  End
 ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_10
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier  = 50
    DestructionDelay  = 500
    DestructionDelayVariance  = 100
    FX  = INITIAL  FX_CrusaderCatchFire
    OCL = MIDPOINT OCL_BTR90DeathEffect
    FX  = FINAL    FX_UnguidedRocketExplosion
  End
  Behavior                 = TransitionDamageFX ModuleTag_084f
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
  End
  Behavior = DestroyDie ModuleTag_09
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  Behavior = FXListDie ModuleTag_10g4
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_TankCrush
  End
  ; A crushing defeat
  Behavior = FXListDie ModuleTag_1134
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_TankCrush
  End
  Behavior = FlammableUpdate ModuleTag_2143
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  Behavior = TransportContain ModuleTag_2234
    Slots                 = 6
    ScatterNearbyOnExit   = Yes
    HealthRegen%PerSec    = 10
    InitialPayload        = Turkey_RepublicanGuard_V1_AK 6
    EnterSound            = GarrisonEnter
    ExitSound             = GarrisonExit
    DamagePercentToUnits  = 100%
    AllowInsideKindOf     = INFANTRY
    ExitDelay             = 250
    NumberOfExitPaths     = 3 ; Defaults to 1.  Set 0 to not use ExitStart/ExitEnd, set higher than 1 to use ExitStart01-nn/ExitEnd01-nn
    GoAggressiveOnExit    = Yes ; AI Will tell people to set their mood to Aggressive on exiting
  End
  Geometry = BOX
  GeometryMajorRadius = 22.0
  GeometryMinorRadius = 9.0
  GeometryHeight = 13.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
