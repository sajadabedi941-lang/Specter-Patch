      WeaponLaunchBone    = PRIMARY WeaponA
      WeaponFireFXBone    = SECONDARY WeaponB
      WeaponLaunchBone    = SECONDARY WeaponB
      WeaponMuzzleFlash   = SECONDARY WeaponB
    End
    ConditionState        = REALLYDAMAGED
      Model               = Irq_BTR90D
      Turret              = Turret
      WeaponFireFXBone    = PRIMARY WeaponA
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY WeaponA
      WeaponLaunchBone    = PRIMARY WeaponA
      WeaponFireFXBone    = SECONDARY WeaponB
      WeaponLaunchBone    = SECONDARY WeaponB
      WeaponMuzzleFlash   = SECONDARY WeaponB
    End
    ConditionState        = RUBBLE
      Model               = Irq_BTR90D
    End
    TrackMarks = EXTireTrack.tga
    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray
    LeftFrontTireBone     = Tire01
    RightFrontTireBone    = Tire08
    LeftRearTireBone      = Tire03
    RightRearTireBone     = Tire05
    MidLeftFrontTireBone  = Tire02
    MidRightFrontTireBone = Tire07
    MidLeftRearTireBone   = Tire04
    MidRightRearTireBone  = Tire06
