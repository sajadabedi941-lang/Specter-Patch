    PowerslideRotationAddition  = 0   ; This vehicle doesn't powerslide.
  End
  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:BTR-90
  Side                = Turkey
  EditorSorting       = VEHICLE
  TransportSlotCount  = 8                 ;how many "slots" we take in a transport (0 == not transportable)
  Prerequisites
    Object = Turkey_Barracks
  End
  WeaponSet 
    Conditions        = None 
    Weapon               = PRIMARY   30mm_2A42
    PreferredAgainst     = PRIMARY   VEHICLE INFANTRY
    Weapon               = SECONDARY 9M113_Konkurs
    PreferredAgainst     = SECONDARY VEHICLE STRUCTURE
  End
  ArmorSet
    Conditions           = None
    Armor                = BTR90Armor
    DamageFX             = TankDamageFX
  End
  BuildCost           = 800
  BuildTime           = 12.0          ;in seconds    
  VisionRange         = 460
  ShroudClearingRange = 240
  ExperienceValue     = 70 70 140 180    ;Experience point value at each level
  ExperienceRequired  = 0 130 180 370  ;Experience points needed to gain each level
  IsTrainable         = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet          = GenericIFVcommandset
  ; *** AUDIO Parameters ***
  VoiceSelect = TroopCrawlerVoiceSelect
  VoiceMove = TroopCrawlerVoiceMove
