Object Turkey_HISAR_A
; PatchBaseCost = 1300
; PatchBaseTime = 12.0
; CountryBalance side=Turkey origin=Domestic tech=AdvancedAirDefense cat=AirDefense key=UnitCostMult rating=Medium cost×0.8822 time×0.9036 => 1147 / 10.8s














Scale = 0.9

  ; *** ART Parameters ***
  SelectPortrait         = rus_torm2u
  ButtonImage            = rus_torm2u
  
  Draw = W3DTankDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ExtraPublicBone = WEAPONA01

    ConditionState = NONE
      Model             = RUS_9A331M2
      Animation         = RUS_9A331M2.RUS_9A331M2
      AnimationMode     = Loop
      Turret            = Turret
      WeaponFireFXBone  = PRIMARY   Missile
      WeaponMuzzleFlash = PRIMARY   Missile
      WeaponLaunchBone  = PRIMARY   Missile
      
    End
      
    ConditionState = REALLYDAMAGED
      Model             = RUS_9A331M2D
      Animation         = RUS_9A331M2D.RUS_9A331M2D
      AnimationMode     = Loop
      Turret            = Turret
      WeaponFireFXBone  = PRIMARY   Missile
      WeaponMuzzleFlash = PRIMARY   Missile
      WeaponLaunchBone  = PRIMARY   Missile
      
    End
    
    ConditionState = RUBBLE
      Model             = RUS_9A331M2D
    End

    TrackMarks              = EXTnkTrack.tga
    TreadAnimationRate      = 4.0  ; amount of tread texture to move per second
  End
  ; --- Indicator
  Draw = W3DModelDraw ModuleTag_Indicator
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = Spec_Indic_ABM
    End
    ConditionState = DYING
      Model = None
    End
  End

  ; ***DESIGN parameters ***
  DisplayName               = OBJECT:Turkey_HISAR_A
  Side                      = Turkey
  MaxSimultaneousOfType = 10
  MaxSimultaneousLinkKey = Patch_AirDefense  ; SPECTER PATCH global limit
  BuildVariations           = Turkey_HISAR_A Turkey_HISAR_A_Combat
  EditorSorting             = VEHICLE
  TransportSlotCount        = 3            ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions         = None 
     Weapon            = PRIMARY   16x_SRADM_9M338_TORM2M
     ;Weapon            = SECONDARY TORM2U_MT_LockControl
  End

  ArmorSet
    Conditions    = None
    Armor         = AATankArmor
    DamageFX      = TankDamageFX
  End
  BuildCost           = 1147
  BuildTime           = 10.8          ;in seconds    
  VisionRange     = 700
  ShroudClearingRange = 300
  Prerequisites
    Object        = Turkey_MIC
    Science       = SCIENCE_Rank4
  End

  ExperienceValue     = 100 100 200 400    ;Experience point value at each level
  ExperienceRequired  = 0 200 400 800  ;Experience points needed to gain each level
  IsTrainable         = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet      = GenericTankCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect     = FrequencyJammerVoiceSelect
  VoiceMove       = FrequencyJammerVoiceMove
  VoiceGuard      = FrequencyJammerVoiceMove
  VoiceAttack     = FrequencyJammerVoiceAttack
  SoundMoveStart  = MicrowaveTankMoveStart
  SoundMoveStartDamaged = MicrowaveTankMoveStart

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = FrequencyJammerVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop  = TurretMoveLoopLoud
    VoiceCrush      = NoSound
    VoiceEnter      = FrequencyJammerVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK DONT_AUTO_CRUSH_INFANTRY ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SCORE
  
  Body              = ActiveBody ModuleTag_02
    MaxHealth       = 800.0
    InitialHealth   = 800.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 600
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = AIUpdateInterface ModuleTag_0A3F3
    Turret
      TurretTurnRate = 320
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = Yes ;Stealthed
    MoodAttackCheckRate = 1
  End
  Locomotor = SET_NORMAL V-55_diesel
  Behavior          = PhysicsBehavior ModuleTag_04
    Mass            = 400.0
  End
  Behavior = FireWeaponUpdate ModuleTag_Radar
    Weapon = 9K332_Radar_Power
  End
  Behavior = StealthDetectorUpdate ModuleTag_Radar_Missiles
    DetectionRate             = 600
    DetectionRange            = 800
    CanDetectWhileGarrisoned  = No
    CanDetectWhileContained   = No
    ExtraRequiredKindOf       = SMALL_MISSILE
  End
    
  ; Just explode death
  Behavior = SlowDeathBehavior ModuleTag_05
    ProbabilityModifier = 19
    DestructionDelay = 200
    DestructionDelayVariance = 100

    SinkRate = 0.5     ; in Dist/Sec

    OCL = FINAL    OCL_RussiaTankECMDebris
    FX  = FINAL    FX_GattlingExplosionOneFinal
  End

  Behavior = CreateCrateDie ModuleTag_06
    CrateData = SalvageCrateData
    ;CrateData = EliteTankCrateData
    ;CrateData = HeroicTankCrateData
  End

  Behavior = TransitionDamageFX ModuleTag_07
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End


  Behavior = MaxHealthUpgrade ModuleTag_HisarNet
    TriggeredBy   = Upgrade_Turkey_HisarNetwork
    AddMaxHealth  = 100.0
    ChangeType    = ADD_CURRENT_HEALTH_TOO
  End
  Behavior = CommandButtonHuntUpdate  ModuleTag_22 ; allows use of command button hunt script with this unit. 
  End
  Geometry            = BOX
  GeometryMajorRadius = 15.0
  GeometryMinorRadius = 10.0
  GeometryHeight      = 15.0     
  GeometryIsSmall     = Yes
  Shadow              = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length    

End
