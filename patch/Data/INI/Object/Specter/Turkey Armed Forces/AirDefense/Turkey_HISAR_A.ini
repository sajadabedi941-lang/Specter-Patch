Object Turkey_HISAR_A_TargetLock
  ; *** ART Parameters ***
  Draw                    = W3DModelDraw ModuleTag_01
    DefaultConditionState
      Model               = None
    End
  End
  ; ***DESIGN parameters ***
  Side             = Turkey
  EditorSorting    = SYSTEM
  TransportSlotCount = 1
  WeaponSet
    Conditions          = None 
    Weapon              = PRIMARY   TORM2U_MT_LockControl
  End
  ArmorSet
    Conditions     = None
    Armor          = InvulnerableAllArmor ; We can't be hurt on the field.  We share damage from the Overlord with his damage module
  End
  VisionRange     = 5000
  ShroudClearingRange = 0
  ; *** AUDIO Parameters ***
  UnitSpecificSounds
    TurretMoveStart = NoSound
    TurretMoveLoop  = NoSound ;TurretMoveLoop
    VoiceRapidFire  = NoSound
  End
  ; *** ENGINEERING Parameters ***
  KindOf            = PRELOAD CAN_ATTACK CLICK_THROUGH IGNORED_IN_GUI VEHICLE UNATTACKABLE
    Body            = StructureBody ModuleTag_02
    MaxHealth       = 1
    InitialHealth   = 1
  End
  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate        = 1
  End
  Behavior = AssistedTargetingUpdate ModuleTag_07
    AssistingClipSize   = 1                       ; How many shots to make when asked by someone of my kind who has a RequestAssistRange weapon
    AssistingWeaponSlot = PRIMARY             ; And the weapon to use.  Should have huge range and no natural clip.
    LaserFromAssisted   = None ;AvengerPointDefenseLaserBeam ; Stream to draw from the requestor to me
    LaserToTarget       = None ;AvengerPointDefenseLaserBeam     ; Stream to draw from me to the target
  End
  Behavior             = DestroyDie ModuleTag_04
    ;nothing
  End
  ;Behavior = FireWeaponUpdate ModuleTag_Hold
    ;Weapon = RadarGuidedAirLaunchedAttackHold
  ;End
  Behavior = DeletionUpdate ModuleTag_fv455j
    MinLifetime = 400
    MaxLifetime = 400
  End
  Geometry            = BOX
  GeometryMajorRadius = 20.0
  GeometryMinorRadius = 3.0
  GeometryHeight      = 3.0
  GeometryIsSmall     = No      
  Shadow              = NONE
End