;------------------------------------------------------------------------------
Object Turkey_100mmCannon_Site

  ; *** ART Parameters ***
  SelectPortrait         = irq_100canon
  ButtonImage            = irq_100canon

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes

    

    ; day ********************************************
    DefaultConditionState
      Model              = Turkey_100Cannon
      Turret              = TURRET
      TurretPitch         = TURRETEL
      WeaponLaunchBone    = PRIMARY TURRETMS01
      WeaponFireFXBone  = PRIMARY   TURRETMS01
      WeaponMuzzleFlash = PRIMARY   TURRETMS01
      WeaponFireFXBone  = PRIMARY   TURRETMS01
      WeaponRecoilBone  = PRIMARY   Barrel
    End

    ConditionState       = DAMAGED
      Model              = Turkey_100Cannon
      Turret              = TURRET
      TurretPitch         = TURRETEL
      WeaponLaunchBone    = PRIMARY TURRETMS01
      WeaponFireFXBone  = PRIMARY   TURRETMS01
      WeaponMuzzleFlash = PRIMARY   TURRETMS01
      WeaponFireFXBone  = PRIMARY   TURRETMS01
      WeaponRecoilBone  = PRIMARY   Barrel
    End

    ConditionState       = REALLYDAMAGED RUBBLE
      Model              = Turkey_100Cannon
      Turret              = TURRET
      TurretPitch         = TURRETEL
      WeaponLaunchBone    = PRIMARY TURRETMS01
      WeaponFireFXBone  = PRIMARY   TURRETMS01
      WeaponMuzzleFlash = PRIMARY   TURRETMS01
      WeaponFireFXBone  = PRIMARY   TURRETMS01
      WeaponRecoilBone  = PRIMARY   Barrel
    End
  End

  PlacementViewAngle = -45

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:100mmc
  Side             = Turkey
  MaxSimultaneousOfType = 6
  MaxSimultaneousLinkKey = Patch_ArtillerySite  ; SPECTER PATCH global limit
  EditorSorting    = STRUCTURE
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY   100mm_Defense_Cannon
  End
  VisionRange         = 500.0
  ShroudClearingRange = 150
  ArmorSet
    Conditions        = None
    Armor             = StructureArmor
    DamageFX          = StructureDamageFXNoShake
  End
  ExperienceValue     = 150 150 150 150  ; Experience point value at each level

  ; *** AUDIO Parameters ***
  VoiceSelect         = AirfieldUSASelect
  SoundOnDamaged        = BuildingDamagedStateLight
  SoundOnReallyDamaged  = BuildingDestroy

  UnitSpecificSounds
    UnderConstruction     = UnderConstructionLoop
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority       = STRUCTURE
  KindOf              = PRELOAD STRUCTURE SELECTABLE CAN_ATTACK IMMOBILE SPAWNS_ARE_THE_WEAPONS SCORE FS_TECHNOLOGY FS_BASE_DEFENSE IMMUNE_TO_CAPTURE GARRISONABLE_UNTIL_DESTROYED
  Body                = StructureBody ModuleTag_130
    MaxHealth         = 1000.0
    InitialHealth     = 1000.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 3200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End

  Behavior = TransportAIUpdate ModuleTag_203
    Turret
      ControlledWeaponSlots = PRIMARY
      TurretTurnRate      = 160.0 ;120   // turn rate, in degrees per sec
      TurretPitchRate     = 160.0 ;120
      AllowsPitch         = Yes
      FiresWhileTurning   = Yes
      NaturalTurretPitch  = 13 ; this keeps it aimed half way between land and sky
                               ; since you never know from whence cometh danger
    End
   AutoAcquireEnemiesWhenIdle  = Yes
    MoodAttackCheckRate        = 250
  End


  Behavior = ProductionUpdate ModuleTag_105
    ; nothing
  End

  Behavior             = CreateObjectDie ModuleTag_08
    CreationList  = OCL_SmallStructureDebris
  End
  Behavior             = FXListDie ModuleTag_1091
    DeathFX       = FX_StructureMediumDeath
  End

  Behavior = GarrisonContain ModuleTag_101
    ContainMax                    = 3
    EnterSound                    = GarrisonEnter
    ExitSound                     = GarrisonExit
    ImmuneToClearBuildingAttacks  = Yes
  End

  Behavior = FlammableUpdate ModuleTag_112
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 5       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  Behavior = DestroyDie ModuleTag_07
    ;nothing
  End

  Behavior = StealthDetectorUpdate ModuleTag_161
    DetectionRate   = 500   ; how often to rescan for stealthed things in my sight (msec)
    DetectionRange = 550 ;Dustin, enable this for independant balancing!
    CanDetectWhileGarrisoned  = No ;Garrisoned means being in a structure that you units can shoot out of.
    CanDetectWhileContained   = No ;Contained means being in a transport or tunnel network.
    ExtraForbiddenKindOf = UNATTACKABLE
  End

  Behavior = TransitionDamageFX ModuleTag_122
    ;-------------DESIGNED FOR MEDIUM SIZED FACTION BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1       = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionMediumExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionMediumShockwave
  End

  Geometry            = CYLINDER
  GeometryMajorRadius = 36.0
  GeometryHeight      = 9.0    
  GeometryIsSmall     = No
  Shadow              = SHADOW_VOLUME
  BuildCompletion     = PLACED_BY_PLAYER


End