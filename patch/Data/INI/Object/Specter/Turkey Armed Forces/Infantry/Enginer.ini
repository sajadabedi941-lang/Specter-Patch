  Behavior = PoisonedBehavior ModuleTag_1F46
    PoisonDamageInterval = 100  ; Every this many msec I will retake the poison damage dealt me...
    PoisonDuration = 3000       ; ... for this long after last hit by poison damage
  End

  Behavior = SpecialAbility ModuleTag_1Y47
    SpecialPowerTemplate      = SpecialAbilityRebelCaptureBuilding
    UpdateModuleStartsAttack  = Yes
    StartsPaused              = Yes
    InitiateSound             = RebelVoiceCapture
  End
  Behavior = SpecialAbilityUpdate ModuleTag_1G4S8
    SpecialPowerTemplate  = SpecialAbilityRebelCaptureBuilding
    StartAbilityRange     = 5.0
