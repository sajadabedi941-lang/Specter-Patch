; SPECTER PATCH Phase 2 - Turkey (Iraq-copy, IDs renamed)

;----------------------------------------------------------------------------;
;-------------- Turkey Armed Forces - Science Tu16 -----------------;
;------------------------ Code By Pcc Studios Team --------------------------;







;------------------------------------------------------------------------------
Object Turkey_Tu16
Scale = 1.2
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    DefaultConditionState
      Model               = Irq_Tu16K
      HideSubObject       = BurnerFX01 BurnerFX02
      WeaponLaunchBone    = PRIMARY WeaponB
      ParticleSysBone = Engine01 HighAltitudeJetContrail
      ParticleSysBone = Engine02 HighAltitudeJetContrail
      ParticleSysBone = WingTip01 JetContrailThin
      ParticleSysBone = WingTip02 JetContrailThin
    End
    ConditionState        = REALLYDAMAGED
      Model               = Irq_Tu16K
      ParticleSysBone = Smoke01 JetFireLarge
      ParticleSysBone = Smoke02 JetFireLarge
      ParticleSysBone = Engine01 JetBlackTrailThin
      ParticleSysBone = Engine02 JetBlackTrailThin
      ParticleSysBone = Smoke01 JetSmokeLarge
      ParticleSysBone = Smoke02 JetSmokeLarge
    End
    ConditionState        = RUBBLE
      Model               = Irq_Tu16K
      AnimationMode       = ONCE
    End
  End
  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:Tu16
  EditorSorting       = VEHICLE
  Side                = Turkey
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)
  VisionRange         = 200.0 
  ArmorSet
    Conditions      = None
    Armor           = AirplaneArmor
    DamageFX        = TankDamageFX
  End
  CommandSet        = Command_ScriptedTransportDrops
  ; *** AUDIO Parameters ***
  SoundAmbient = B52AmbientLoop
  SoundAmbientRubble    = NoSound

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS CAN_ATTACK VEHICLE SCORE TRANSPORT AIRCRAFT IGNORED_IN_GUI EMP_HARDENED
  Body = ActiveBody ModuleTag_03
    MaxHealth       = 1500.0
    InitialHealth   = 1500.0
  End
  ExperienceValue = 200 200 200 200    ;Experience point value at each level
  ;SCRIPTED SUPPORT: These special powers are triggered directly 
  ;from the transport without creating a transport. This is done 
  ;via new code support and CreateLocation USE_OWNER_OBJECT -- 
  ;which also prevents creating the payload transport.
  Behavior    = OCLSpecialPower ModuleTag_04
    SpecialPowerTemplate = SuperweaponFOAB  ;@@KRIS@@
    OCL                  = SUPERWEAPON_FOAB
    CreateLocation       = USE_OWNER_OBJECT
    ScriptedSpecialPowerOnly = Yes
  End
  Behavior = PhysicsBehavior ModuleTag_07
    Mass = 1500.0
    AllowCollideForce = Yes
    VehicleCrashesIntoNonBuildingWeaponTemplate = GreaterAircraftCrashedDamageWeapon
    VehicleCrashesIntoBuildingWeaponTemplate = GreaterAircraftCrashedDamageWeapon
  End
  Behavior = DeliverPayloadAIUpdate ModuleTag_08
    DoorDelay         = 500
    MaxAttempts       = 4
    DropOffset        = X:0 Y:0 Z:-10
    DropDelay         = 300     ; time in between each item dropped (if more than one)
    PutInContainer    = AmericaParachute
    DeliveryDistance  = 150
  End
  Locomotor = SET_NORMAL Mikulin_AM-3JetEngine
  Behavior = TransportContain ModuleTag_09
    Slots                       = 100                     ; hey, it's a BIG transport
    ScatterNearbyOnExit         = No
    OrientLikeContainerOnExit   = Yes
    KeepContainerVelocityOnExit = Yes
    ExitPitchRate               = 30
    ExitBone                    = WeaponA01
    AllowInsideKindOf           = INFANTRY VEHICLE PROJECTILE DOZER PARACHUTABLE
    DoorOpenTime                = 0                ; this prevents the Contain module from messing with the doors, since we want DeliverPayload to handle 'em
    NumberOfExitPaths           = 0
    DestroyRidersWhoAreNotFreeToExit = Yes  ; 'destroy' as opposed to 'kill'
  End 
  Behavior                          = JetSlowDeathBehavior ModuleTag_10b5
    DestructionDelay                = 15000
    RollRate                        = 0.1
    RollRateDelta                   = 1%    ;each frame, rollrate = rollrate * rollrateDelta
    PitchRate                       = 0.0
    FallHowFast                     = 80.0%    ;Bigger is faster (can be over 100%,it's a fraction of gravity)
    FXInitialDeath                  = FX_JetBigDeathInitial
    OCLInitialDeath                 = OCL_AmericaJetCargoDeathStart
    DelaySecondaryFromInitialDeath  = 2000       ; in milliseconds
    OCLSecondary                    = OCL_AmericaJetCargoHulkDeath
    FXSecondary                     = FX_BigPlaneDeath
    FXHitGround                     = FX_BigJetDeathHitGround
    FXFinalBlowUp                   = FX_JetDeathFinalBlowUp
    DelayFinalBlowUpFromHitGround   = 1000
    OCLFinalBlowUp                  = OCL_AmericaJetB52DeathFinalBlowUp
;   DeathLoopSound                  = MICAL NEEDS TO MAKE ME
  End
  Behavior = TransitionDamageFX ModuleTag_11
  End
  Behavior                = CountermeasuresBehavior ModuleTag_124g
    TriggeredBy           = Upgrade_AmericaCountermeasures
    FlareTemplateName     = CountermeasureFlare
    FlareBoneBaseName     = Flare ; Name of the base flare bone (Flare01, Flare02, Flare03)
    VolleySize            = 4     ; Number of flares launched per volley (requires bones)
    VolleyArcAngle        = -90.0  ; Max angle of flare relative to forward direction (with VolleySize of 1, flare will always goes straight back).
    VolleyVelocityFactor  = 6.5   ; Shoots out flares at a stronger velocity with a higher value.
    DelayBetweenVolleys   = 160  ; Time between flare volleys
    NumberOfVolleys       = 4     ; Number of times the volleys will fire before reloading
    ReloadTime            = 1600     ; After all volleys launched, then reloading must occur. If 0, then reloading occurs at airstrip only.
    EvasionRate           = 55%   ; With active flares, the specified percentage will be diverted.
    ReactionLaunchLatency = 100     ; Reaction between getting shot at and the firing of the first volley of countermeasures.
    MissileDecoyDelay     = 200   ; A reported missile that has been determined to hit a decoy will wait this long before acquiring countermeasures.
  End
  ClientUpdate = AnimatedParticleSysBoneClientUpdate ModuleTag_Client01
  End
;---------- Radar Signature --------------- ;
  Behavior = FireWeaponWhenDamagedBehavior ModuleTag_RS
    StartsActive                = Yes
    ReactionWeaponPristine      = RadarWaveEmitter
    ReactionWeaponDamaged       = RadarWaveEmitter
    ReactionWeaponReallyDamaged = RadarWaveEmitter
    ReactionWeaponRubble        = RadarWaveEmitter
    DamageTypes                 = NONE +MICROWAVE
  End
;---------- End Of Radar Signature ----------;
  Geometry = Box
  GeometryIsSmall = No
  GeometryMajorRadius = 60.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 10.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End