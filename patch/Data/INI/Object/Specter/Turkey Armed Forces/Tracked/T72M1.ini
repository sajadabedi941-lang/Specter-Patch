Object Turkey_T-72
; PatchBaseCost = 1000
; PatchBaseTime = 16.0
; CountryBalance side=Turkey origin=Domestic tech=Standard cat=Tank key=UnitCostMult rating=Medium cost×0.8075 time×0.81 => 808 / 13.0s






  ; *** ART Parameters ***
  SelectPortrait         = irq_t72a
  ButtonImage            = irq_t72a
  Draw = W3DOverlordTankDraw ModuleTag_01
    ExtraPublicBone = FIREPOINT01
    DefaultConditionState
      Model               = Irq_T72M1
      Turret              = Turret
      TurretPitch         = barrleend
      WeaponFireFXBone    = PRIMARY TURRETMS01
      WeaponRecoilBone    = PRIMARY BARRLE
      WeaponMuzzleFlash   = PRIMARY TURRETMS01
      WeaponLaunchBone    = PRIMARY TURRETMS01
      WeaponFireFXBone    = SECONDARY TURRETMS02
      WeaponLaunchBone    = SECONDARY TURRETMS02
      WeaponMuzzleFlash   = SECONDARY TURRETMS02
      WeaponFireFXBone    = TERTIARY TURRETMS01
      WeaponRecoilBone    = TERTIARY BARRLE
      WeaponMuzzleFlash   = TERTIARY TURRETMS01
      WeaponLaunchBone    = TERTIARY TURRETMS01
    End
    ConditionState       = REALLYDAMAGED
      Model              = Irq_T72M1_D
      Turret              = Turret
      TurretPitch         = barrleend
      WeaponFireFXBone    = PRIMARY TURRETMS01
      WeaponRecoilBone    = PRIMARY BARRLE
      WeaponMuzzleFlash   = PRIMARY TURRETMS01
      WeaponLaunchBone    = PRIMARY TURRETMS01
      WeaponFireFXBone    = SECONDARY TURRETMS02
      WeaponLaunchBone    = SECONDARY TURRETMS02
      WeaponMuzzleFlash   = SECONDARY TURRETMS02
      WeaponFireFXBone    = TERTIARY TURRETMS01
      WeaponRecoilBone    = TERTIARY BARRLE
      WeaponMuzzleFlash   = TERTIARY TURRETMS01
      WeaponLaunchBone    = TERTIARY TURRETMS01
    End
    ConditionState       = RUBBLE
      Model              = Irq_T72M1_D
    End
    TrackMarks           = EXTnkTrack.tga
    TreadAnimationRate      = 2.0  ; amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
    OkToChangeModelColor = Yes
  End
  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:T72M1
  Side             = Turkey
  EditorSorting    = VEHICLE
  TransportSlotCount = 3                 ;how many "slots" we take in a transport (0 == not transportable)
  WeaponSet
    Conditions          = None 
    Weapon              = PRIMARY      125mm_2A46M
    Weapon              = SECONDARY    7_62mm_PKT_Coaxial
    PreferredAgainst    = SECONDARY    INFANTRY
    AutoChooseSources   = SECONDARY    FROM_PLAYER FROM_SCRIPT FROM_AI
    Weapon              = TERTIARY     125mm_2A46M5_HE
    AutoChooseSources   = TERTIARY     None
  End
  ArmorSet
    Conditions      = None
    Armor           = T72M1_Obr1984_Armor
    DamageFX        = TankDamageFX
  End
  BuildCost           = 808
  BuildTime           = 13.0          ;in seconds    
  VisionRange     = 510
  ShroudClearingRange = 380
  
  ExperienceValue = 100 100 200 400    ;Experience point value at each level
  ExperienceRequired = 0 200 300 600 ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 1  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet       = GenericMainbBattleTankCommandSet
  ; *** AUDIO Parameters ***
  VoiceSelect = MarauderTankVoiceSelect
  VoiceMove = MarauderTankVoiceMove
  VoiceGuard = MarauderTankVoiceMove
  ;SoundAmbient = GenericiraqiTankMoveLoop
  VoiceAttack = MarauderTankVoiceAttack
  SoundMoveStart = MarauderTankMoveStart
  SoundMoveStartDamaged = MarauderTankMoveStart
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = MarauderTankVoiceAttack
    TurretMoveLoop = TurretMoveLoop
    VoiceSalvage = MarauderTankVoiceSalvage      
    VoiceCrush = MarauderTankVoiceCrush
    VoiceEnter = MarauderTankVoiceMove
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SCORE
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 1100.0
    InitialHealth   = 1100.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 800
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = TransportAIUpdate ModuleTag_03
    Turret
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
      TurretTurnRate      = 150.0
      FiresWhileTurning   = Yes
      NaturalTurretPitch  = 13
    End
   AutoAcquireEnemiesWhenIdle  = Yes
    MoodAttackCheckRate        = 1
  End
  Behavior = EnemyNearUpdate ModuleTag_03f2
  End
  Locomotor            = SET_NORMAL V-12_diesel
  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 500.0
  End
  Behavior = VeterancyGainCreate ModuleTag_14
    StartingLevel = VETERAN
  End
  ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_10
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier  = 80
    DestructionDelay  = 5000
    DestructionDelayVariance  = 10
    ;FX  = MIDPOINTL  FX_CrusaderCatchFire
    FX  = INITIAL  FX_GenericTankAmmoCockoff
    OCL = MIDPOINT OCL_T72M1DeathEffect
    FX  = FINAL    FX_GenericFreeFallBombsExplosion ;FX_GenericTankDeathExplosion
    ;FX  = MIDPOINT    FX_GenericTankDeathExplosion
    OCL = FINAL    OCL_T72M1Turret
  End
  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_11
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier  = 20
    DestructionDelay  = 5000
    DestructionDelayVariance  = 300
    FX  = INITIAL  FX_GenericTankAmmoCockoff ;FX_CrusaderCatchFire
    OCL = FINAL    OCL_T72M1DeathEffect
    FX  = FINAL    FX_GenericTankDeathExplosion
  End
  Behavior                 = TransitionDamageFX ModuleTag_12
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
  End
  Behavior                 = TransitionDamageFX ModuleTag_CFS
    ReallyDamagedParticleSystem1 = Bone:Smoke02 RandomBone:Yes PSys:GenericDamagedTankSmoke
  End
  Behavior                 = TransitionDamageFX ModuleTag_CS
    RubbleParticleSystem1  = Bone:Fire01 RandomBone:Yes PSys:TankFire
  End
  Behavior = DestroyDie ModuleTag_13
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  ; A crushing defeat
  Behavior = FXListDie ModuleTag_134
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_TankCrush
  End
  Behavior = CreateObjectDie ModuleTag_15
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End
  Behavior = OverlordContain ModuleTag_RCWShb65
    Slots                   = 1
    DamagePercentToUnits    = 100%
    AllowInsideKindOf       = PORTABLE_STRUCTURE
    PassengersAllowedToFire = Yes
    PassengersInTurret      = Yes ; My passengers ride in my turret, that's where the Firepoint bones are
    ExperienceSinkForRider  = Yes ; I get the Exp for things my turret friend kills
    PayloadTemplateName     = TurkeyTurretsNSVS
  End
  Geometry = BOX
  GeometryMajorRadius = 18.0
  GeometryMinorRadius = 11.0
  GeometryHeight = 10     
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME    
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End
