; SPECTER PATCH — Turkey air force projectiles (KAAN / F-16V / Bayraktar)
; Patch overlay only. Turkey Armed Forces.

Object Turkey_Projectile_KAAN_BVR
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ConditionState
      Model = AGM-114
      ParticleSysBone = Engine01 SmokelessMissileExhaust
      ParticleSysBone = Engine01 CountermeasureFlareParticleSys
    End
  End
  DisplayName = OBJECT:Turkey_Projectile_KAAN_BVR
  EditorSorting = SYSTEM
  VisionRange = 0.0
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
  End
  KindOf = PROJECTILE SMALL_MISSILE
  Body = ActiveBody ModuleTag_02
    MaxHealth = 400.0
    InitialHealth = 400.0
  End
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +DETONATED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = NONE +LASERED
    FX = FX_GenericMissileDisintegrate
    OCL = OCL_GenericMissileDisintegrate
  End
  Behavior = InstantDeathBehavior DeathModuleTag_03
    DeathTypes = ALL -LASERED -DETONATED
    FX = FX_GenericMissileDeath
  End
  Behavior = PhysicsBehavior ModuleTag_06
    Mass = 22
    AllowCollideForce = Yes
    KillWhenRestingOnGround = Yes
  End
  Behavior = MissileAIUpdate ModuleTag_08
    TryToFollowTarget = Yes
    FuelLifetime = 9000
    InitialVelocity = 360
    IgnitionDelay = 120
    IgnitionFX = FX_JetMissileIgnition
    DistanceScatterWhenJammed = 90
    DistanceToTravelBeforeTurning = 12
    DistanceToTargetBeforeDiving = 400
  End
  Locomotor = SET_NORMAL AGM114NMissileLocomotor
  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End

