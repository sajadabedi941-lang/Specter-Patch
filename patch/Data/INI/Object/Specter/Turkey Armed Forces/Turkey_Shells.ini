Object Turkey_Generic_30mmAPFSDS

   ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = None
    End
  End

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:APFSDS
  EditorSorting   = SYSTEM
  VisionRange = 0.0  
  ArmorSet
    Conditions      = None
    Armor           = ProjectileArmor
    DamageFX        = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE UNATTACKABLE
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 100.0
    InitialHealth   = 100.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    ; A projectile is not disabled, but instead loses target and scatters
    SubdualDamageCap = 200
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End

  Behavior = PhysicsBehavior ModuleTag_06
    Mass = 1.01 ; can't be zero, but we want it tiny so that it travels nearly straight
  End
    
  Behavior = DumbProjectileBehavior ModuleTag_04
    DetonateCallsKill = Yes
    FirstHeight                   = 10
    SecondHeight                  = 30
    FirstPercentIndent            = 33% 
    SecondPercentIndent           = 66%
    FlightPathAdjustDistPerSecond = 9999
    OrientToFlightPath            = Yes
  End

  Behavior = PhysicsBehavior ModuleTag_05
    AllowCollideForce = Yes
    KillWhenRestingOnGround = Yes
  End

  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = ALL
    FX         = FX_30mmAPFSDSHitEffect
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End
