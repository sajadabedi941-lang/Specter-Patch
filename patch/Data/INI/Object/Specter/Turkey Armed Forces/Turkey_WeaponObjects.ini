      Model = Turkey_Sarab7_M
    End
    ConditionState = JAMMED
      Model = Turkey_Sarab7_M
      ParticleSysBone = None SparksMedium
    End
  End

  ; ***DESIGN parameters ***
  DisplayName       = OBJECT:Sarab-7
  EditorSorting     = SYSTEM
  VisionRange = 200.0  

  ArmorSet
    Conditions      = None
    Armor           = CruiseMissileArmor
    DamageFX        = None
  End
  SoundAmbient  = GenericMissileAmbientLoop
  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD CAN_CAST_REFLECTIONS PROJECTILE SMALL_MISSILE
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 1900.0
    InitialHealth   = 1900.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    ; A projectile is not disabled, but instead loses target and scatters
    SubdualDamageCap = 200
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +DETONATED
    ; we detonated normally.
  End
  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = NONE +LASERED
    ; shot down by laser.
    FX         = FX_GenericMissileDisintegrate
    OCL        = OCL_GenericMissileDisintegrate
  End
  Behavior = InstantDeathBehavior DeathModuleTag_03
    DeathTypes = ALL -LASERED -DETONATED
    ; shot down by nonlaser.
    FX         = FX_GenericMissileDeath
  End
; ---- end Projectile death behaviors
  Behavior = PhysicsBehavior ModuleTag_07
    Mass = 1
  End
  Behavior = MissileAIUpdate ModuleTag_08
    TryToFollowTarget     = Yes 
    FuelLifetime          = 90000
    InitialVelocity       = 75                ; in dist/sec
    IgnitionDelay         = 30
    IgnitionFX            = FX_TubedMissileLaunchIgnition
    DistanceToTravelBeforeTurning = 200
    DistanceToTargetBeforeDiving = 300 ; When I hit this close to target, I ignore PreferredHeight. 
    ; Note, if this is too small, the missile will turn too late to hit.  And, since we have a 2D 
    ; heart, being over the target counts as "there", so we'll give up and just go straight.

    DistanceToTargetForLock = 10 ; Short lock on, as it looks better flying.  jba.
  End

  Locomotor = SET_NORMAL Turkey_Sarab-7MissileLocomotor

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0

End
