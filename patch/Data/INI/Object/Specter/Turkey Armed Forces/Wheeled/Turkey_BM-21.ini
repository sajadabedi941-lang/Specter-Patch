Object Turkey_BM-21
; PatchBaseCost = 1000
; PatchBaseTime = 15.0
; CountryBalance side=Turkey origin=Domestic tech=Standard cat=Vehicle key=UnitCostMult rating=Medium cost×0.8075 time×0.81 => 808 / 12.2s









  ; *** ART Parameters ***
  SelectPortrait         = irq_bm21
  ButtonImage            = irq_bm21
  
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DTruckDraw ModuleTag_01
    OkToChangeModelColor  = Yes
    ConditionState        = NONE
      Model               = Turkey_Bm21
      Turret              = Turret
      TurretPitch         = TurretLE
      WeaponLaunchBone    = PRIMARY   MuzzleFX
      WeaponLaunchBone    = SECONDARY MuzzleFX
      WeaponLaunchBone    = TERTIARY  MuzzleFX
    End
    ConditionState        = REALLYDAMAGED
      Model               = Turkey_Bm21D
      Turret              = Turret
      TurretPitch         = TurretLE
      WeaponLaunchBone    = PRIMARY   MuzzleFX
      WeaponLaunchBone    = SECONDARY MuzzleFX
      WeaponLaunchBone    = TERTIARY  MuzzleFX
    End

    ConditionState        = RUBBLE
      Model               = Turkey_Bm21D
    End
    TrackMarks = EXTireTrack.tga
    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray
    LeftFrontTireBone = Tire02
    RightFrontTireBone = Tire01
    MidLeftRearTireBone = Tire04
    MidRightRearTireBone = Tire03
    LeftRearTireBone = Tire06
    RightRearTireBone = Tire05
    TireRotationMultiplier = 0.2 ; this * speed = rotation.
  End
  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:BM-21
  Side                = Turkey
  MaxSimultaneousOfType = 4
  MaxSimultaneousLinkKey = Patch_StrategicLauncher  ; SPECTER PATCH global limit
  EditorSorting       = VEHICLE
  TransportSlotCount  = 1                 ;how many "slots" we take in a transport (0 == not transportable)
  WeaponSet
    Conditions          = None 
    Weapon              = PRIMARY     122mm_M21OF_Grad_Semi
    Weapon              = SECONDARY   122mm_M21OF_Grad_Salvo
    AutoChooseSources   = SECONDARY     None
    ShareWeaponReloadTime = Yes
  End
  ArmorSet
    Conditions      = None
    Armor           = TruckArmor
    DamageFX        = TankDamageFX
  End
  BuildCost           = 808
  BuildTime           = 12.2          ;in seconds    
  VisionRange     = 550
  ShroudClearingRange = 150
  
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet            = Smerch_CommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = PaladinTankVoiceSelect
  VoiceMove = PaladinTankVoiceMove
  VoiceGuard = PaladinTankVoiceMove
  VoiceAttack = PaladinTankVoiceAttack
  SoundMoveStart = PaladinTankMoveStart
  SoundMoveStartDamaged = PaladinTankMoveStart

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = PaladinTankVoiceCreate
    TurretMoveLoop = TurretMoveLoop
    SoundEject = PilotSoundEject
    VoiceEject = PilotVoiceEject
    VoiceCrush = PaladinTankVoiceCrush
    VoiceEnter = PaladinTankVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE DONT_AUTO_CRUSH_INFANTRY CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE SCORE

  Body = ActiveBody ModuleTag_023TA
    MaxHealth       = 400
    InitialHealth   = 400

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 240
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = AIUpdateInterface ModuleTag_03FA3
      Turret
      TurretTurnRate = 30   ; turn rate, in degrees per sec
      TurretPitchRate = 20
      FirePitch = 42  ; Instead of aiming pitchwise at the target, it will aim here
      AllowsPitch = Yes
      ControlledWeaponSlots = PRIMARY SECONDARY ;TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = Yes NotWhileAttacking
   End
  Locomotor = SET_NORMAL Zil-375V8
  Behavior = PhysicsBehavior ModuleTag_04D3
    Mass = 100.0
  End
  Behavior = ProductionUpdate ModuleTag_08AD
    MaxQueueEntries = 1; So you can't build multiple upgrades in the same frame
  End
  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_L8F09
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 50
    DestructionDelay = 100
    DestructionDelayVariance = 300
    FX  = INITIAL  FX_CrusaderCatchFire
    OCL = FINAL    OCL_BM21DeathEffect
    FX  = FINAL    FX_MediumHeatExplosion
  End
  Behavior = DestroyDie ModuleTag_12
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  Behavior = FXListDie ModuleTag_13
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateCrateDie ModuleTag_CratesChange
    CrateData = SalvageCrateData
    ;CrateData = EliteTankCrateData
    ;CrateData = HeroicTankCrateData
  End
  Behavior = TransitionDamageFX ModuleTag_14A33ADA
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  Behavior = FlammableUpdate ModuleTag_213RE3AE
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  Geometry = BOX
  GeometryMajorRadius = 15.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 10.0     
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME 
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length   
End