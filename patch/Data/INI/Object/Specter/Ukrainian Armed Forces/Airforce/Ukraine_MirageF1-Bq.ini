;------------------------------------------------------------------------------
Object Ukraine_MirageF1_Bq
  ; *** ART Parameters ***
  SelectPortrait         = irq_miragef
  ButtonImage            = irq_miragef
  
  UpgradeCameo1  = Upgrade_AmericaCountermeasures
  
  Draw = W3DModelDraw ModuleTag_01

    OkToChangeModelColor = Yes

    
      DefaultConditionState
      Model               = Irq_MirageF1_Bq
      WeaponLaunchBone    = PRIMARY WEAPONA
    End

    ConditionState        = JETEXHAUST
      ParticleSysBone     = WINGTIP01 JetContrail
      ParticleSysBone     = WINGTIP02 JetContrail
      ParticleSysBone     = ENGINE01 SpectreEngineFlare2
      
    End

    ConditionState        = JETEXHAUST JETAFTERBURNER
     ShowSubObject        = BurnerFX01 BurnerFX02
      ParticleSysBone     = ENGINE01   JetExhaust
      ParticleSysBone     = WINGTIP01  JetContrail
      ParticleSysBone     = WINGTIP02  JetContrail
      ParticleSysBone     = ENGINE01   JetExhaust
      ParticleSysBone     = WINGTIP01  JetContrail
      ParticleSysBone     = WINGTIP02  JetContrail
      ParticleSysBone     = Engine01   JetBlackTrailThin
      ParticleSysBone     = Engine01   JetLenzflare
    End

    ConditionState        = REALLYDAMAGED
      Model               = Irq_MirageF1_Bq
      ; damage
      ParticleSysBone     = Smoke01 JetSmoke
      ParticleSysBone     = Engine01 JetEngineDamagedSmoke
    End
    
    ConditionState        = REALLYDAMAGED JETEXHAUST
      Model               = Irq_MirageF1_Bq
      ; damage
      ParticleSysBone     = WINGTIP01 JetContrail
      ParticleSysBone     = WINGTIP02 JetContrail
      ParticleSysBone     = ENGINE01 JetExhaust
    End

    ConditionState        = REALLYDAMAGED JETEXHAUST JETAFTERBURNER
      Model               = Irq_MirageF1_Bq
      ; damage
      ParticleSysBone     = Smoke01 JetSmoke
      ParticleSysBone     = Engine01 JetEngineDamagedSmoke
      ; afterburner
      ShowSubObject       = BurnerFX01 BurnerFX02
      ParticleSysBone     = Engine01 JetLenzflare
      ; exhaust
      ParticleSysBone     = Wingtip01 JetContrail
      ParticleSysBone     = Wingtip02 JetContrail
    End

    ConditionState        = RUBBLE
      Model               = Irq_MirageF1_Bq
      HideSubObject       = None 
      ShowSubObject       = None
    End

    ConditionState        = RUBBLE JETEXHAUST JETAFTERBURNER
      Model               = Irq_MirageF1_Bq
      ;HideSubObject is needed cause there're inherited from default condition state      
      HideSubObject       = None 
      ShowSubObject       = None
      ParticleSysBone     = Engine01 JetExhaust
      ; exhaust
      ParticleSysBone     = Wingtip01 JetContrail
      ParticleSysBone     = Wingtip02 JetContrail
    End

    OkToChangeModelColor = Yes

  End

  ; ***DESIGN parameters ***
  DisplayName             = OBJECT:MirageF1_Eq
  EditorSorting           = VEHICLE
  Side                    = Ukraine
  TransportSlotCount      = 0          ;how many "slots" we take in a transport (0 == not transportable)
  VisionRange             = 600.0 
  ShroudClearingRange     = 250
  WeaponSet
    Conditions        = None
    Weapon            = PRIMARY    2x_KH29L_AGM_F1EQ
  End
  ;WeaponSet
    ;Conditions        = PLAYER_UPGRADE
    ;Weapon            = PRIMARY    Cyrano_IV_Monopulse_Radar_AGMode_T
    ;Weapon            = SECONDARY  AASM250kg_LeaserGuidedBomb_MF1_T
    ;Weapon            = TERTIARY   Cyrano_IV_Monopulse_Radar_AGMode_T2
  ;End
  
  ArmorSet
    Conditions            = None
    Armor                 = AirplaneArmor
    DamageFX              = None
  End
  Prerequisites
    Object = Ukraine_RadarStation
  End


  BuildCost               = 2100
  BuildTime               = 25.0   
  ExperienceValue         = 50 50 100 150  ;Experience point value at each level
  ExperienceRequired      = 0 100 200 400   ;Experience points needed to gain each level
  IsTrainable             = Yes             ;Can gain experience
  CrusherLevel           = 1  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet              = GenericTacticalBomberCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect            = RaptorVoiceSelect
  VoiceMove              = RaptorVoiceMove
  VoiceAttack            = RaptorVoiceAttack
  VoiceAttackAir         = RaptorVoiceAttackAir
  VoiceGuard             = RaptorVoiceAirPatrol
  SoundAmbient           = RaptorAmbientLoop
  SoundAmbientRubble     = NoSound
  ; SoundMoveLoop          = RaptorAmbientLoop  ; don't want sound while sitting at airfield
  ; SoundAmbient           = NoSound
  UnitSpecificSounds
    VoiceCreate          = RaptorVoiceCreate
    SoundEject           = PilotSoundEject
    VoiceEject           = PilotVoiceEject
    Afterburner          = RaptorAfterburner
    VoiceLowFuel         = RaptorVoiceLowFuel
    VoiceGarrison        = RaptorVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority          = UNIT
  KindOf                 = PRELOAD CAN_CAST_REFLECTIONS CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT
  Body                   = ActiveBody ModuleTag_02
    MaxHealth            = 600.0
    InitialHealth        = 600.0
  End
 
  Behavior                          = JetSlowDeathBehavior ModuleTag_03
    FXOnGroundDeath                 = FX_JetOnGroundDeath
    OCLOnGroundDeath                = OCL_MIGDeathFinalBlowUp
    DestructionDelay                = 99999999  ; destruction will happen when we
    RollRate                        = 0.2
    RollRateDelta                   = 100%      ;each frame, rollrate = rollrate * rollrateDelta
    PitchRate                       = 0.0
    FallHowFast                     = 110.0%    ;Bigger is faster (can be over 100%,it's a fraction of gravity)
    FXInitialDeath                  = FX_MigDeathInitial
    OCLInitialDeath                 = OCL_MIGDeathInitial
    DelaySecondaryFromInitialDeath  = 500       ; in milliseconds
    FXSecondary                     = FX_JetDeathSecondary
    OCLSecondary                    = OCL_MIGDeathSecondary
    FXHitGround                     = FX_JetDeathHitGround
    OCLHitGround                    = OCL_MIGDeathHitGround
    DelayFinalBlowUpFromHitGround   = 200       ; in milliseconds
    FXFinalBlowUp                   = FX_JetDeathFinalBlowUp
    ;OCLFinalBlowUp                  = OCL_MIGDeathFinalBlowUp
  End

  Behavior                = ArmorUpgrade ModuleTag_Armor25
    TriggeredBy           = Upgrade_AmericaCountermeasures
  End

  Behavior                = CountermeasuresBehavior ModuleTag_10
    TriggeredBy           = Upgrade_AmericaCountermeasures
    FlareTemplateName     = CountermeasureFlare
    FlareBoneBaseName     = Flare ; Name of the base flare bone (Flare01, Flare02, Flare03)
    VolleySize            = 3     ; Number of flares launched per volley (requires bones)
    VolleyArcAngle        = 90.0  ; Max angle of flare relative to forward direction (with VolleySize of 1, flare will always goes straight back).
    VolleyVelocityFactor  = 5.0   ; Shoots out flares at a stronger velocity with a higher value.
    DelayBetweenVolleys   = 160  ; Time between flare volleys
    NumberOfVolleys       = 4     ; Number of times the volleys will fire before reloading
    ReloadTime            = 1600     ; After all volleys launched, then reloading must occur. If 0, then reloading occurs at airstrip only.
    EvasionRate           = 55%   ; With active flares, the specified percentage will be diverted.
    ReactionLaunchLatency = 0     ; Reaction between getting shot at and the firing of the first volley of countermeasures.
    MissileDecoyDelay     = 50   ; A reported missile that has been determined to hit a decoy will wait this long before acquiring countermeasures.
  End
  Behavior                = CountermeasuresBehavior ModuleTag_2d0
    TriggeredBy           = Upgrade_AmericaCountermeasures
    FlareTemplateName     = CountermeasureCHAFF
    FlareBoneBaseName     = Flare ; Name of the base flare bone (Flare01, Flare02, Flare03)
    VolleySize            = 3     ; Number of flares launched per volley (requires bones)
    VolleyArcAngle        = -20.0  ; Max angle of flare relative to forward direction (with VolleySize of 1, flare will always goes straight back).
    VolleyVelocityFactor  = 5.0   ; Shoots out flares at a stronger velocity with a higher value.
    DelayBetweenVolleys   = 200  ; Time between flare volleys
    NumberOfVolleys       = 3     ; Number of times the volleys will fire before reloading
    ReloadTime            = 1800     ; After all volleys launched, then reloading must occur. If 0, then reloading occurs at airstrip only.
    EvasionRate           = 65%   ; With active flares, the specified percentage will be diverted.
    ReactionLaunchLatency = 0     ; Reaction between getting shot at and the firing of the first volley of countermeasures.
    MissileDecoyDelay     = 50   ; A reported missile that has been determined to hit a decoy will wait this long before acquiring countermeasures.
  End
  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 500.0
  End
  Behavior = WeaponSetUpgrade ModuleTag_07
    TriggeredBy = Upgrade_Iraq_Mi35Mk3
  End

  Behavior = JetAIUpdate ModuleTag_06
    OutOfAmmoDamagePerSecond  = 10%     ; amount of damage to take per SEC (not per frame) when out of ammo
                                        ; note that it's expressed as a percent of max health, not an absolute
    TakeoffDistForMaxLift     = 0%   ; larger numbers give more lift sooner when taking off
    TakeoffPause              = 1500
    MinHeight                 = 7
    ReturnToBaseIdleTime      = 10000         ; if idle for this long, return to base, even if not out of ammo
  End
  Locomotor = SET_NORMAL R-35F-300_JetEngine
  Locomotor = SET_TAXIING BasicJetTaxiLocomotor


  Behavior = FlammableUpdate ModuleTag_08
    AflameDuration = 5000        ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500      ; this often.
  End
  Behavior                       = TransitionDamageFX ModuleTag_09
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes Psys:SmokeSmallContinuous01
    ReallyDamagedFXList1         = Loc: X:0 Y:0 Z:0 FXList:FX_MIGDamageTransition
  End

  Behavior = ProductionUpdate ModuleTag_12
   ;nothing
  End
;---------- Radar Signature --------------- ;
  Behavior = FireWeaponWhenDamagedBehavior ModuleTag_RS
    StartsActive                = Yes
    ReactionWeaponPristine      = RadarWaveEmitter
    ReactionWeaponDamaged       = RadarWaveEmitter
    ReactionWeaponReallyDamaged = RadarWaveEmitter
    ReactionWeaponRubble        = RadarWaveEmitter
    DamageTypes                 = NONE +MICROWAVE
  End
;---------- End Of Radar Signature ----------;
  Geometry                 = Box
  GeometryIsSmall          = Yes
  GeometryMajorRadius      = 24.0
  GeometryMinorRadius      = 17.0
  GeometryHeight           = 5.0
  Shadow                   = SHADOW_VOLUME
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length

End