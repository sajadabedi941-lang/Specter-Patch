; SPECTER PATCH — UN army kit (Specter Nato donor clone)
; Unique IDs only. Original Specter files untouched.

;------------------------------------------------------------------------------
Object UN_VehicleVBCI
; PatchBaseCost = 700
; PatchBaseTime = 12.0
; CountryBalance side=UN origin=Domestic tech=Standard cat=Vehicle key=UnitCostMult rating=MediumHigh cost×0.8479 time×0.81 => 594 / 9.7s
Scale = 0.9
  ; *** ART Parameters ***
  SelectPortrait         = Nat_vbci
  ButtonImage            = Nat_vbci
  Draw = W3DTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = NAT_VBCI
      Turret = Turret
      WeaponFireFXBone  = PRIMARY TURRETMS01
      WeaponMuzzleFlash = PRIMARY TURRETMS01
      WeaponLaunchBone  = PRIMARY TURRETMS01
      WeaponFireFXBone  = SECONDARY Missile
      WeaponLaunchBone  = SECONDARY Missile
    End
    ConditionState = REALLYDAMAGED
      Model = NAT_VBCID
      Turret = Turret
      WeaponFireFXBone  = PRIMARY TURRETMS01
      WeaponMuzzleFlash = PRIMARY TURRETMS01
      WeaponLaunchBone  = PRIMARY TURRETMS01
      WeaponFireFXBone  = SECONDARY Missile
      WeaponLaunchBone  = SECONDARY Missile
    End
    ConditionState = RUBBLE
      Model = NAT_VBCID
      Turret = Turret
      WeaponFireFXBone  = PRIMARY TURRETMS01
      WeaponMuzzleFlash = PRIMARY TURRETMS01
      WeaponLaunchBone  = PRIMARY TURRETMS01
      WeaponFireFXBone  = SECONDARY Missile
      WeaponLaunchBone  = SECONDARY Missile
    End
    TrackMarks = EXTireTrack.tga
    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray
    PowerslideSpray = RocketBuggyDirtPowerSlide
    ; These parameters are only used if the model has a separate suspension, 
    ; and the locomotor has HasSuspension = Yes.
    LeftFrontTireBone = Tire01
    RightFrontTireBone = Tire02
    LeftRearTireBone = Tire03
    RightRearTireBone = Tire04
    TireRotationMultiplier = 0.2   ; this * speed = rotation.
    PowerslideRotationAddition = 1.25   ; This speed is added to the rotation speed when powersliding.
  End
  ; ***DESIGN parameters ***
  DisplayName           = OBJECT:VBCI
  Side                  = UN
  EditorSorting         = VEHICLE
  TransportSlotCount    = 3
  WeaponSet
    Conditions           = None 
    Weapon               = PRIMARY   25mm_M242Gun
    Weapon               = SECONDARY BGM-71E_Tow-Bradly
    PreferredAgainst     = SECONDARY VEHICLE STRUCTURE
  End
  ArmorSet
    Conditions      = None
    Armor           = M1126_SlatArmor
    DamageFX        = TruckDamageFX
  End
  Prerequisites
    Object = UN_StrategyCenter
    Science = SCIENCE_Rank5
  End
  BuildCost           = 594
  BuildTime           = 9.7          ;in seconds    
  VisionRange     = 400
  ShroudClearingRange = 180
  ExperienceValue = 50 50 100 150   ;Experience point value at each level
  ExperienceRequired = 0 100 150 300  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet      = M1126_Commandset
  ; *** AUDIO Parameters ***
  VoiceSelect = HumveeVoiceSelect
  VoiceMove = HumveeVoiceMove
  VoiceGuard = HumveeVoiceMove
  VoiceAttack = HumveeVoiceAttack
  VoiceAttackAir = HumveeVoiceAttackTOW
  SoundMoveStart = HumveeMoveStart
  SoundMoveStartDamaged = HumveeMoveStart
  SoundEnter = HumveeEnter
  SoundExit = HumveeExit
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    ;TurretMoveStart    = NoSound
    VoiceCreate         = HumveeVoiceCreate
    TurretMoveLoop      = TurretMoveLoop
    SoundEject          = PilotSoundEject
    VoiceEject          = PilotVoiceEject
    VoiceCrush          = HumveeVoiceCrush
  ; Required for the W3DTruckDraw module
    TruckLandingSound = RocketBuggyLand
    TruckPowerslideSound = RocketBuggyPowerslide
    VoiceUnload = HumveeVoiceUnload
    VoiceEnter = HumveeVoiceMove
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SCORE TRANSPORT
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 800.0
    InitialHealth   = 800.0
    SubdualDamageCap = 480
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate       = 140 ;   // turn rate, in degrees per sec
      ControlledWeaponSlots= PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL Generic8x8Locomotor
  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 200.0
  End
  Behavior = TransportContain  ModuleTag_05
    PassengersAllowedToFire = Yes
    Slots                = 8
    ;InitialPayload       = AmericaMarines_V1_M4 8
    DamagePercentToUnits = 100% ;10%
    AllowInsideKindOf    = INFANTRY
    ExitDelay            = 250
    NumberOfExitPaths    = 3 ; Defaults to 1.  Set 0 to not use ExitStart/ExitEnd, set higher than 1 to use ExitStart01-nn/ExitEnd01-nn
    GoAggressiveOnExit   = Yes ; AI Will tell people to set their mood to Aggressive on exiting
  End
  Behavior = SlowDeathBehavior ModuleTag_11
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 25
    DestructionDelay = 1
    OCL = INITIAL  OCL_M1126DeathEffect
    FX  = FINAL    FX_BattleMasterExplosionOneFinal
    OCL = FINAL    OCL_M1126DeathEffectFinal
  End
  Behavior = DestroyDie ModuleTag_12
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  Behavior = FXListDie ModuleTag_13
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = TransitionDamageFX ModuleTag_17
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  Geometry = BOX
  GeometryMajorRadius = 24.0
  GeometryMinorRadius = 17.0
  GeometryHeight = 11.5     
  GeometryIsSmall = Yes 
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length

End