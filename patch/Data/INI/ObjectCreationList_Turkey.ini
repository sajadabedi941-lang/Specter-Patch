ObjectCreationList SUPERWEAPON_TurkishSFInsertion
  DeliverPayload
    Transport = Turkey_Mi-8T_S
    StartAtPreferredHeight = Yes
    StartAtMaxSpeed = Yes
    MaxAttempts = 4
    DropOffset = X:5 Y:0 Z:-10
    DropDelay = 80         ; time in between each item dropped (if more than one)
    ParachuteDirectly = Yes ; will tell all contained parachutes to go ahead and bunch
    PutInContainer = AmericaParachute
    Payload = TurkeyInfantrySpecOps_Akms 3
    DeliveryDistance = 0  ;when outbound vehicle must be this close to target to continue delivery
    PreOpenDistance = 300 ;When inbound, vehicle can be this much farther than DeliveryDistance to begin delivery 
    DeliveryDecalRadius = 150
    DeliveryDecal
      Texture           = Spec_Paradrop
      Style             = SHADOW_ALPHA_DECAL
      OpacityMin        = 25%
      OpacityMax        = 50%
      OpacityThrobTime  = 500
      Color             = R:255 G:255 B:255 A:255 
      OnlyVisibleToOwningPlayer = Yes
    End
    ;RequiresLivePlayer = Yes ; I want to require a live player, but I'll settle for dropping neutral rangers instead
  End
  DeliverPayload
  Transport = Turkey_Mi-8T_S
    StartAtPreferredHeight = Yes
    StartAtMaxSpeed = Yes
    MaxAttempts = 4
    DropOffset = X:-5 Y:0 Z:-30
    DropDelay = 80        ; time in between each item dropped (if more than one)
    ParachuteDirectly = Yes ; will tell all contained parachutes to go ahead and bunch
    PutInContainer = AmericaParachute
    Payload = TurkeyInfantrySpecOps_Akms 3
    Payload = TurkeyInfantryAirborneHeavySniper 1
    DeliveryDistance = 100  ;when outbound vehicle must be this close to target to continue delivery
    PreOpenDistance = 350 ;When inbound, vehicle can be this much farther than DeliveryDistance to begin delivery 
  End
End
