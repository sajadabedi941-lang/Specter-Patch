; SPECTER PATCH Phase 2 - Turkey OCLs (from Iraq)

ObjectCreationList SUPERWEAPON_TurkishCruiseStrike1

  DeliverPayload
    Transport                       = Turkey_255mmAl-FawCannon
    FormationSize                   = 5 ;/2
    FormationSpacing                = 20.6 ;x3
    StartAtPreferredHeight          = Yes
    StartAtMaxSpeed                 = Yes
    MaxAttempts                     = 1                   ;max attempts
    DeliveryDistance                = 250                 ;distance from target allowed to start/stop dropping.
    WeaponErrorRadius               = 100                 ; how bad the artillerist is
    DelayDeliveryMax                = 700                ; his delayed reaction to "Fire!"
    VisibleItemsDroppedPerInterval  = 1                   ;Drops two bombs at a time
    VisibleDropBoneBaseName         = RootTransform       ;The bombs are created and dropped at this bone base
    VisibleSubObjectBaseName        = Bomb                ;The bombs are visible until dropped.
    VisibleNumBones                 = 1                   ;Number of bones.
    VisiblePayloadTemplateName      = Turkey_255mmShell  ;Created when payload is dropped.
    VisiblePayloadWeaponTemplate    = 255mmShellDamageWeapon
    InheritTransportVelocity        = Yes                 ;The bombs will start at transport velocity.
    ExitPitchRate                   = 2                   ;The bomb will pitch down.
    SelfDestructObject              = Yes                 ; so the delivery vehicle goes away 'POP!'
    DeliveryDecalRadius = 225
    DeliveryDecal
      Texture           = Spec_Arty
      Style             = SHADOW_ALPHA_DECAL
      OpacityMin        = 25%
      OpacityMax        = 50%
      OpacityThrobTime  = 500
      Color             = R:255 G:166 B:0 A:255 
      OnlyVisibleToOwningPlayer = Yes
    End
  End
End

