;==============================================================================
; SPECTER PATCH - Phase 1 structure scaffold
; Compatible overlay for Generals Zero Hour Specter mod.
; Does NOT modify original Specter archives.
; Method: Iraq-copy (same pattern as FactionNorthKorea).
; Status: STRUCTURE ONLY - unit/building content TBD in later phases.
;==============================================================================

; FILE: PlayerTemplate_SpecterPatch.ini
; Additive PlayerTemplates only (engine loads all INI under Data/INI).

PlayerTemplate FactionTurkey
  Side              = Turkey
  BaseSide          = Turkey
  PlayableSide      = Yes
  ; Multiplayer + Skirmish: PlayableSide=Yes registers Turkey in Specter faction picker
  ; (same additive pattern as stock FactionNorthKorea — no FactionList.ini required).
  StartMoney        = 0
  PreferredColor    = R:227 G:10 B:23 ; Turkish army/flag red
  IntrinsicSciences = SCIENCE_Turkey
  PurchaseScienceCommandSetRank1 = SCIENCE_Turkey_CommandSetRank1
  PurchaseScienceCommandSetRank3 = SCIENCE_Turkey_CommandSetRank3
  PurchaseScienceCommandSetRank8 = SCIENCE_Turkey_CommandSetRank8
  SpecialPowerShortcutCommandSet = SpecialPowerShortcutTurkeySystem
  SpecialPowerShortcutWinName     = GenPowersShortcutBarGLA.wnd
  SpecialPowerShortcutButtonCount = 10
  DisplayName       = INI:FactionTurkey
  StartingBuilding  = Turkey_CommandCenter
  StartingUnit0     = Turkey_VT72B
  StartingUnit1     = TurkeySystemSpecialPowerShortcut
  ScoreScreenImage  = GLA_ScoreScreen
  LoadScreenImage   = Turkey_Flag
  LoadScreenMusic   = Load_GLA
  ScoreScreenMusic  = Score_GLA
  FlagWaterMark     = WatermarkTurkey
  EnabledImage      = SSObserverTurkey
  BeaconName        = MultiplayerBeacon
  SideIconImage     = GameinfoTurkey
  GeneralImage      = Turkey_Logo
  OldFaction        = No
  ArmyTooltip       = TOOLTIP:BioStrategyLong_Turkey
  Features          = GUI:BioFeatures_Turkey
  MedallionRegular  = GLAGeneral_slvr
  MedallionHilite   = GLAGeneral_blue
  MedallionSelect   = GLAGeneral_orng
End

