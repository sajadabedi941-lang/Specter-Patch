; SPECTER PATCH - Realistic nuclear capability balance
; Policy:
;   North Korea  — starts with nuclear path (Intrinsic Al-Hussein)
;   United States — full strategic (LGM-30 Rank8 silo, Trident theater Rank5)
;   Israel (AirF) — limited Jericho (SCIENCE_IDFNukes Rank8, expensive)
;   Nato         — NO independent nuclear arsenal (US nuclear umbrella)
;   Iran         — NO nuclear weapons (Sejjil = conventional MRBM only)
;   Iraq/Turkey  — NO nuclear weapons (FOAB is conventional fuel-air)

; ---- North Korea: intrinsic nuclear starter marker ----
Science SCIENCE_NorthKorea_NuclearCapability
  PrerequisiteSciences = None
  SciencePurchasePointCost = 0
  IsGrantable = No
  DisplayName = SCIENCE:NorthKoreaNuclearCapability
  Description = CONTROLBAR:ToolTipNorthKoreaNuclearCapability
End

; Early warhead research — Rank1 still required to purchase, but NK starts holding
; SCIENCE_NorthKorea_Alhussien via PlayerTemplate IntrinsicSciences (see PlayerTemplate).

; ---- Nato: disable orphan nuclear purchase (no launch object; prevents fake capability) ----
Science SCIENCE_NatoNukes
  PrerequisiteSciences = SCIENCE_NATO SCIENCE_Rank8
  SciencePurchasePointCost = 99
  IsGrantable = No
  DisplayName = SCIENCE:NatoNukes
  Description = CONTROLBAR:ToolTipNatoNukesDisabled
End

; ---- Israel: limited strategic deterrent (Rank8, costly) ----
Science SCIENCE_IDFNukes
  PrerequisiteSciences = SCIENCE_AMERICA SCIENCE_Rank8
  SciencePurchasePointCost = 5
  IsGrantable = Yes
  DisplayName = SCIENCE:IDFNukes
  Description = CONTROLBAR:ToolTipIDFNukes
End

; ---- United States theater Trident — keep Rank5+DaisyCutter, slightly costlier ----
Science SCIENCE_Trident
  PrerequisiteSciences = SCIENCE_AMERICA SCIENCE_DaisyCutter SCIENCE_Rank5
  SciencePurchasePointCost = 4
  IsGrantable = Yes
  DisplayName = SCIENCE:Trident
  Description = CONTROLBAR:ToolTipUSAScienceTrident
End

; ---- United States mobile Trident TEL research ----
Science SCIENCE_M1075I
  PrerequisiteSciences = SCIENCE_AMERICA SCIENCE_Rank3
  SciencePurchasePointCost = 2
  IsGrantable = Yes
  DisplayName = SCIENCE:M1075I
  Description = CONTROLBAR:ToolTipUSAScienceM1075I
End
