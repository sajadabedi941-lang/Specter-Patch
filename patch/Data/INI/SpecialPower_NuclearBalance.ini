; SPECTER PATCH - Nuclear / strategic special power cooldowns & tiers
; Power ladder (ReloadTime ms): higher = rarer / more strategic
;   USA Trident theater   ~12 min (720000)  — theater nuclear strike
;   USA LGM-30 Minuteman  ~30 min (1800000) — full strategic ICBM
;   Israel Jericho III    ~35 min (2100000) — limited deterrent
;   Iran Sejjil           ~20 min (1200000) — CONVENTIONAL MRBM (not nuclear)
;   NK FOAB / Abbas       use faction SpecialPower_* files (conventional FOAB)

; ---- United States ----
SpecialPower SuperweaponAmericaTrident
  Enum                = SPECIAL_NEUTRON_MISSILE
  ReloadTime          = 720000
  InitiateAtLocationSound = AirRaidSiren
  PublicTimer         = No
  SharedSyncedTimer   = Yes
  ViewObjectDuration  = 30000
  ViewObjectRange     = 250
  RadiusCursorRadius  = 125
  ShortcutPower       = Yes
  AcademyClassify     = ACT_SUPERPOWER
End

SpecialPower AmericaSpecialPowerLGM30G
  Enum                = SPECIAL_NEUTRON_MISSILE
  ReloadTime          = 1800000
  InitiateAtLocationSound = AirRaidSiren
  PublicTimer         = Yes
  ViewObjectDuration  = 40000
  ViewObjectRange     = 250
  RadiusCursorRadius  = 200
  ShortcutPower       = Yes
  AcademyClassify     = ACT_SUPERPOWER
End

; ---- Israel (limited arsenal) ----
SpecialPower IsraelSpecialPowerJerichoIII
  Enum                = SPECIAL_NEUTRON_MISSILE
  ReloadTime          = 2100000
  InitiateAtLocationSound = AirRaidSiren
  PublicTimer         = Yes
  ViewObjectDuration  = 40000
  ViewObjectRange     = 250
  RadiusCursorRadius  = 180
  ShortcutPower       = Yes
  AcademyClassify     = ACT_SUPERPOWER
End

; ---- Iran Sejjil: conventional ballistic (SCUD_STORM enum, not NEUTRON) ----
SpecialPower Iran_SejjilMissile
  Enum                = SPECIAL_SCUD_STORM
  ReloadTime          = 1200000
  InitiateSound       = ScudStormInitiated
  PublicTimer         = Yes
  ViewObjectDuration  = 40000
  ViewObjectRange     = 250
  RadiusCursorRadius  = 160
  ShortcutPower       = Yes
  AcademyClassify     = ACT_SUPERPOWER
End
