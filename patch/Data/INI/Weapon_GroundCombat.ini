; SPECTER PATCH - Ground Combat System weapons
; Unique Weapon IDs for AD differentiation. MP-deterministic fixed values.
; Projectile / FX names reference Specter / patch assets already loaded by clients.

;------------------------------------------------------------------------------
; Medium mobile SAM (HISAR-O / Akash / Khordad) — better range/reload vs stock alias
Weapon Patch_Weapon_MediumSAM
  PrimaryDamage         = 90.0
  PrimaryDamageRadius   = 15.0
  SecondaryDamage       = 25.0
  SecondaryDamageRadius = 30.0
  AttackRange           = 420.0
  MinimumAttackRange    = 40.0
  DamageType            = EXPLOSION
  DeathType             = EXPLODED
  WeaponSpeed           = 400
  MinWeaponSpeed        = 350
  FireFX                = FX_MediumMissileIgnition
  ProjectileObject      = Turkey_9M336Missile
  ProjectileDetonationFX = FX_GenericMissileDeath
  RadiusDamageAffects   = ALLIES ENEMIES NEUTRALS NOT_SIMILAR
  DelayBetweenShots     = 2500
  ClipSize              = 4
  ClipReloadTime        = 18000
  AutoReloadsClip       = Yes
  AutoReloadWhenIdle    = 16000
  AcceptableAimDelta    = 30
  AntiAirborneVehicle   = Yes
  AntiAirborneInfantry  = Yes
  AntiGround            = No
  ProjectileCollidesWith = ALLIES STRUCTURES WALLS
End

