; SPECTER PATCH - Resource income overlay templates
; SAGE cannot scale ValuePerSupplyBox per faction at runtime.
; High-economy factions receive AutoDeposit "trade/oil bonus" modules on
; their supply centers; low-economy factions receive smaller bonuses.
;
; Wire ModuleTag_PatchResourceIncome onto each faction SupplyCenter Object.
; DepositAmount values below are BASE (Medium). Generator / authors multiply
; by ResourceIncome.<EconomyRating>.PortTradeMult or OilDepositMult.

; --- Template: copy into <Side>_SupplyCenter ---
; Behavior = AutoDepositUpdate ModuleTag_PatchResourceIncome
;   DepositTiming       = 15000
;   DepositAmount       = <SCALED>
;   InitialCaptureBonus = 0
; End

; Reference scaled DepositAmount (PortTrade-style passive income):
;   VeryHigh  = 28
;   High      = 25
;   MediumHigh= 22
;   Medium    = 20
;   MediumLow = 18
;   Low       = 17
;
; Oil derrick intent (when faction captures TechOilDerrick — map object):
; authors may ship Side-specific capture bonuses via scripts; INI overlay
; cannot safely replace the shared civilian derrick without affecting all.

Object PatchEconomy_IncomeReference
  ; Non-playable reference stub — documents intended deposit ladder.
  KindOf = IMMOBILE UNATTACKABLE IGNORED_IN_GUI
  Body = ActiveBody ModuleTag_Body
    MaxHealth = 1
    InitialHealth = 1
  End
  Behavior = AutoDepositUpdate ModuleTag_RefMedium
    DepositTiming = 15000
    DepositAmount = 20
    InitialCaptureBonus = 0
  End
End
