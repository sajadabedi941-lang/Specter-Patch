;==============================================================================
; SPECTER PATCH — FINAL RUNTIME FIX: Boss faction object aliases
; Root cause: PlayerTemplate/CommandButtons reference Boss_* objects that were
; never defined in Specter loose INI (vanilla ZH kept them in Boss.ini / .big).
; Fix: define all referenced Boss_* objects as Side=Boss aliases of existing
; Specter units/buildings, wiring Boss_* CommandSets where they exist.
;==============================================================================

