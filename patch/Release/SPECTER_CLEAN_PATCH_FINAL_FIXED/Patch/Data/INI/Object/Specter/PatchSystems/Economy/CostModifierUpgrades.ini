; SPECTER PATCH - Domestic MIC / asymmetric CostModifierUpgrade helpers
; CostModifierUpgrade can only target KindOf groups (not single Object IDs).
; Upgrade definitions live in Data/INI/Upgrade_PatchEconomy.ini
;
; Example wiring (Turkey_MIC already enables DomesticIndustry):
; Behavior = GrantUpgradeCreate ModuleTag_PatchDomInd
;   UpgradeToGrant = Upgrade_Patch_DomesticIndustry
; End
; Behavior = CostModifierUpgrade ModuleTag_PatchDomVeh
;   TriggeredBy  = Upgrade_Patch_DomesticIndustry
;   EffectKindOf = VEHICLE
;   Percentage   = -5%
; End
