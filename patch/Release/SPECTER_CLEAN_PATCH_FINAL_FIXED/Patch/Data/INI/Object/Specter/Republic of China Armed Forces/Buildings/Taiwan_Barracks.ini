; SPECTER PATCH — INI integrity repair
; Barracks object for Taiwan derived from Taiwan_BootCamp

; SPECTER PATCH — Taiwan army kit (Specter Nato donor clone)
; Unique IDs only. Original Specter files untouched.

;------------------------------------------------------------------------------
Object Taiwan_Barracks
; PatchBaseCost = 600
; PatchBaseTime = 10.0
; CountryBalance side=Taiwan origin=Domestic tech=Standard cat=Building key=UnitCostMult rating=High cost×0.8882 time×0.7857 => 533 / 7.9s

 
  ; *** ART Parameters ***
  SelectPortrait         = us_camp
  ButtonImage            = us_camp
  PlacementViewAngle     = -45
    
  ;Main barracks model
  Draw                   = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    
    ;DAY *******************************
    ConditionState       = NONE
      Model              = US_Camp
      Animation          = US_Camp.US_Camp
      AnimationMode      = LOOP
    End
    ConditionState       = DAMAGED
      Model              = US_Camp
      Animation          = US_Camp.US_Camp
      AnimationMode      = LOOP
    End
    ConditionState       = REALLYDAMAGED RUBBLE
      Model              = US_Camp
      Animation          = US_Camp.US_Camp
      AnimationMode      = LOOP
    End
    
    AliasConditionState  = SOLD 
    AliasConditionState  = SOLD DAMAGED
    AliasConditionState  = SOLD REALLYDAMAGED
    AliasConditionState  = SOLD NIGHT
    AliasConditionState  = SOLD NIGHT DAMAGED
    AliasConditionState  = SOLD NIGHT REALLYDAMAGED
    AliasConditionState  = SOLD SNOW
    AliasConditionState  = SOLD SNOW DAMAGED
    AliasConditionState  = SOLD SNOW REALLYDAMAGED
    AliasConditionState  = SOLD NIGHT SNOW
    AliasConditionState  = SOLD NIGHT SNOW DAMAGED
    AliasConditionState  = SOLD NIGHT SNOW REALLYDAMAGED
  End
 
  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:Barracks
  Side                = Taiwan
  EditorSorting       = STRUCTURE
  BuildCost           = 533
  BuildTime           = 7.9           ; in seconds
  EnergyProduction    = 0
  CommandSet          = Taiwan_BarracksCommandSet
  VisionRange         = 214.0           ; Shroud clearing distance
  ShroudClearingRange = 210.0
  ArmorSet
    Conditions        = None
    Armor             = StructureArmor
    DamageFX          = StructureDamageFXNoShake
  End
  ExperienceValue     = 100 100 100 100  ; Experience point value at each level

  Prerequisites
;    Object = AmericaPowerPlant
  End
 
  ; *** AUDIO Parameters ***
  VoiceSelect = BarracksUSASelect
  SoundOnDamaged        = BuildingDamagedStateLight
  SoundOnReallyDamaged  = BuildingDestroy

  UnitSpecificSounds
    UnderConstruction     = UnderConstructionLoop
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority        = STRUCTURE
  KindOf               = PRELOAD STRUCTURE SELECTABLE IMMOBILE HEAL_PAD SCORE CAPTURABLE FS_FACTORY AUTO_RALLYPOINT MP_COUNT_FOR_VICTORY FS_BARRACKS
  Body                 = StructureBody ModuleTag_05
    MaxHealth          = 1000.0
    InitialHealth      = 1000.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 1200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End
  Behavior = HealContain ModuleTag_06
    ContainMax          = 10 ;way bigger than the # of objects we can have  
    TimeForFullHeal     = 2000   ;(in milliseconds)
    AllowInsideKindOf   = INFANTRY
    AllowAlliesInside   = Yes
    AllowNeutralInside  = No
    AllowEnemiesInside  = No
  End
  Behavior = DestroyDie ModuleTag_07
    ;nothing
  End
  Behavior                  = CreateObjectDie ModuleTag_08
    CreationList       = OCL_LargeStructureDebris
  End
  Behavior                  = CreateObjectDie ModuleTag_09
    CreationList       = OCL_AmericanRangerDebris02
    ExemptStatus       = UNDER_CONSTRUCTION
  End
  Behavior                  = FXListDie ModuleTag_10
    DeathFX            = FX_StructureMediumDeath
  End
  Behavior = ProductionUpdate ModuleTag_11
    ; nothing
  End
  Behavior = DefaultProductionExitUpdate ModuleTag_12
    UnitCreatePoint    = X:  0.0  Y:  0.0   Z:0.0
    NaturalRallyPoint  = X: 55.0  Y:  0.0   Z:0.0
  End
  Behavior = BaseRegenerateUpdate ModuleTag_13
    ;No data
  End 

  Behavior = FlammableUpdate ModuleTag_15
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 5       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = TransitionDamageFX ModuleTag_16
    ;-------------DESIGNED FOR MEDIUM SIZED FACTION BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1       = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionMediumExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionMediumShockwave
  End
  Behavior                  = ObjectCreationUpgrade ModuleTag_MMT
    UpgradeObject           = OCL_NATBTD
    TriggeredBy             = Upgrade_ICBM_BoosterKiller
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_KillMarker
    DeathWeapon  = GenericTargetMarkerKiller
    StartsActive = Yes
  End
  Behavior          = FireWeaponWhenDeadBehavior ModuleTag_KillMarker2
    DeathWeapon     = GenericTargetMarkerKiller
    StartsActive    = Yes
    RequiredStatus  = SOLD
  End

  Geometry             = BOX
  GeometryMajorRadius  = 65.0
  GeometryMinorRadius  = 55.0
  GeometryHeight       = 20.0
  GeometryIsSmall      = No
  FactoryExitWidth    = 25     ; How much space to leave for units exiting.
  Shadow               = SHADOW_VOLUME
  BuildCompletion      = PLACED_BY_PLAYER
 
End
