; SPECTER PATCH — Taiwan army kit (Specter Nato donor clone)
; Unique IDs only. Original Specter files untouched.


;------------------------------------------------------------------------------
Object Taiwan_PowerStation
; PatchBaseCost = 800
; PatchBaseTime = 10.0
; CountryBalance side=Taiwan origin=Domestic tech=Standard cat=Building key=UnitCostMult rating=High cost×0.8882 time×0.7857 => 711 / 7.9s

Scale = 0.8
  ; *** ART Parameters ***
  SelectPortrait         = us_powerplant
  ButtonImage            = us_powerplant

; ---- the building itself ------
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes

    ; day ********************************************
    ConditionState       = NONE;
      Model              = US_Powerplant
      Animation          = US_Powerplant.US_Powerplant
      AnimationMode      = LOOP
      ParticleSysBone    = Steam01 SteamVent
      ParticleSysBone    = Steam02 SteamVent
    End
    ConditionState       = DAMAGED
      Model              = US_Powerplant
      Animation          = US_Powerplant.US_Powerplant
      AnimationMode      = LOOP
      ParticleSysBone    = Steam01 SteamVent
      ParticleSysBone    = Steam02 SteamVent
    End
    ConditionState       = REALLYDAMAGED RUBBLE
      Model              = US_Powerplant
      Animation          = US_Powerplant.US_Powerplant
      AnimationMode      = LOOP
      ParticleSysBone    = Steam01 SteamVent
      ParticleSysBone    = Steam02 SteamVent
    End
    ConditionState       = POWER_PLANT_UPGRADED
      Model              = US_PowerplantU
      Animation          = US_PowerplantU.US_PowerplantU
      AnimationMode      = LOOP
      ParticleSysBone    = Steam01 SteamVent
      ParticleSysBone    = Steam02 SteamVent
    End
    ConditionState       = DAMAGED POWER_PLANT_UPGRADED
      Model              = US_PowerplantU
      Animation          = US_PowerplantU.US_PowerplantU
      AnimationMode      = LOOP
      ParticleSysBone    = Steam01 SteamVent
      ParticleSysBone    = Steam02 SteamVent
    End
    ConditionState       = REALLYDAMAGED RUBBLE POWER_PLANT_UPGRADED
      Model              = US_PowerplantU
      Animation          = US_PowerplantU.US_PowerplantU
      AnimationMode      = LOOP
      ParticleSysBone    = Steam01 SteamVent
      ParticleSysBone    = Steam02 SteamVent
    End
    
    AliasConditionState  = SOLD 
    AliasConditionState  = SOLD DAMAGED
    AliasConditionState  = SOLD REALLYDAMAGED
    AliasConditionState  = SOLD NIGHT
    AliasConditionState  = SOLD NIGHT DAMAGED
    AliasConditionState  = SOLD NIGHT REALLYDAMAGED
    AliasConditionState  = SOLD SNOW
    AliasConditionState  = SOLD SNOW DAMAGED
    AliasConditionState  = SOLD SNOW REALLYDAMAGED
    AliasConditionState  = SOLD NIGHT SNOW
    AliasConditionState  = SOLD NIGHT SNOW DAMAGED
    AliasConditionState  = SOLD NIGHT SNOW REALLYDAMAGED
  End
  
  
 
  PlacementViewAngle = -45

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:ColdFusionReactor
  Side             = Taiwan
  EditorSorting    = STRUCTURE
  Prerequisites
;    Object = AmericaCommandCenter
  End
  BuildCost           = 711
  BuildTime           = 7.9           ; in seconds
  EnergyProduction = 13
  EnergyBonus      = 5
  VisionRange      = 214.0           ; Shroud clearing distance
  ShroudClearingRange = 210.0
  ArmorSet
    Conditions     = None
    Armor          = StructureArmor
    DamageFX       = StructureDamageFXNoShake
  End
  CommandSet          = Taiwan_PowerPlantCommandSet
  ExperienceValue     = 100 100 100 100  ; Experience point value at each level

  ; *** AUDIO Parameters ***
  VoiceSelect = ColdFusionReactorSelect
  SoundOnDamaged        = BuildingDamagedStateLight
  SoundOnReallyDamaged  = BuildingDestroy

  UnitSpecificSounds
    UnderConstruction     = UnderConstructionLoop
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority   = STRUCTURE
  KindOf          = PRELOAD STRUCTURE SELECTABLE IMMOBILE SCORE CAPTURABLE FS_POWER MP_COUNT_FOR_VICTORY
  Body            = StructureBody ModuleTag_06
    MaxHealth       = 800.0
    InitialHealth   = 800.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 1000
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End

  Behavior = PowerPlantUpgrade ModuleTag_07
    TriggeredBy = Upgrade_AmericaAdvancedControlRods
  End

  Behavior = BaseRegenerateUpdate ModuleTag_08
    ;No data
  End
  Behavior = PowerPlantUpdate ModuleTag_09
    RodsExtendTime = 600
  End


  Behavior = DestroyDie ModuleTag_10
    ;nothing
  End
  Behavior             = CreateObjectDie ModuleTag_11
    CreationList  = OCL_ABPowerPlantExplode
  End
  Behavior             = CreateObjectDie ModuleTag_12
    CreationList  = OCL_AmericanRangerDebris02
    ExemptStatus  = UNDER_CONSTRUCTION
  End
  Behavior        = FXListDie ModuleTag_13
    DeathFX       = FX_StructureSmallDeath
  End

  Behavior = ProductionUpdate ModuleTag_14
    ; nothing
  End

  Behavior = FlammableUpdate ModuleTag_16
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 5       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = TransitionDamageFX ModuleTag_17
    ;-------------DESIGNED FOR SMALL SIZED FACTION BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1       = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionSmallExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionSmallShockwave
  End
  Behavior                  = ObjectCreationUpgrade ModuleTag_MMT
    UpgradeObject           = OCL_NATBTD
    TriggeredBy             = Upgrade_ICBM_BoosterKiller
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_KillMarker
    DeathWeapon  = GenericTargetMarkerKiller
    StartsActive = Yes
  End
  Behavior          = FireWeaponWhenDeadBehavior ModuleTag_KillMarker2
    DeathWeapon     = GenericTargetMarkerKiller
    StartsActive    = Yes
    RequiredStatus  = SOLD
  End

  Geometry            = BOX
  GeometryMajorRadius = 50.0
  GeometryMinorRadius = 45.0
  GeometryHeight      = 46.0
  GeometryIsSmall     = No
  Shadow          = SHADOW_VOLUME
  BuildCompletion = PLACED_BY_PLAYER

End
