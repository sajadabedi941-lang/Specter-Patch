; SPECTER PATCH - Asymmetric warfare balance
; Applied on top of Economy × Origin × Tech.
; MatchEconomyRating lists which faction tiers receive the Category bonus.
; CostMult < 1 = cheaper for those tiers.

AsymmetricRule Drone_LowEconomy
  Category            = Drone
  MatchEconomyRating  = Low MediumLow
  CostMult            = 0.75
  TimeMult            = 0.90
End

AsymmetricRule Missile_LowEconomy
  Category            = Missile
  MatchEconomyRating  = Low MediumLow
  CostMult            = 0.80
  TimeMult            = 0.95
End

AsymmetricRule Infantry_LowEconomy
  Category            = Infantry
  MatchEconomyRating  = Low MediumLow
  CostMult            = 0.70
  TimeMult            = 0.85
End

AsymmetricRule AirDefense_LowEconomy
  Category            = AirDefense
  MatchEconomyRating  = Low MediumLow
  CostMult            = 0.80
  TimeMult            = 0.90
End

AsymmetricRule Artillery_LowEconomy
  Category            = Artillery
  MatchEconomyRating  = Low MediumLow
  CostMult            = 0.85
  TimeMult            = 0.95
End

; Medium tiers get a milder drone/infantry edge
AsymmetricRule Drone_MediumEconomy
  Category            = Drone
  MatchEconomyRating  = Medium
  CostMult            = 0.90
  TimeMult            = 0.95
End

AsymmetricRule Infantry_MediumEconomy
  Category            = Infantry
  MatchEconomyRating  = Medium
  CostMult            = 0.90
  TimeMult            = 0.95
End

AsymmetricRule AirDefense_MediumEconomy
  Category            = AirDefense
  MatchEconomyRating  = Medium
  CostMult            = 0.92
  TimeMult            = 0.97
End
