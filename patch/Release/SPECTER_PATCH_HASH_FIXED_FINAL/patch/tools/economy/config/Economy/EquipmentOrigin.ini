; SPECTER PATCH - Equipment origin modifiers
; Every unit should resolve to one Origin for its owning Side.
; Domestic  = designed/produced by that faction
; Licensed  = local assembly / licensed production of foreign designs
; Imported  = foreign purchase / foreign tech dependency

EquipmentOrigin Domestic
  CostMult            = 0.85
  TimeMult            = 0.90
  UpgradeCostMult     = 0.85
  Description         = Cheaper and faster for the owner faction
End

EquipmentOrigin Licensed
  CostMult            = 1.00
  TimeMult            = 1.00
  UpgradeCostMult     = 1.00
  Description         = Moderate / baseline cost
End

EquipmentOrigin Imported
  CostMult            = 1.25
  TimeMult            = 1.10
  UpgradeCostMult     = 1.20
  Description         = Increased cost for foreign equipment
End
