Object Turkey_SNR75
Scale = 0.95
  ; *** ART Parameters ***
  SelectPortrait         = rus_92n6r
  ButtonImage            = rus_92n6r
  Draw = W3DModelDraw ModuleTag_01
    DefaultConditionState
      Model              = Irq_SNR75
      Animation          = Irq_SNR75.Irq_SNR75
      AnimationMode      = LOOP
    End
    ConditionState       = REALLYDAMAGED 
      Model              = Irq_SNR75
      Animation          = Irq_SNR75.Irq_SNR75
      AnimationMode      = LOOP
    End
    AliasConditionState  = RUBBLE
    OkToChangeModelColor = Yes
  End
  ; --- Indicator
  ;Draw = W3DModelDraw ModuleTag_Indicator
    ;OkToChangeModelColor = Yes
    ;DefaultConditionState
      ;Model = Spec_Indic_Srch
    ;End
    ;ConditionState = DYING
     ; Model = None
    ;End
  ;End
  ; ***DESIGN parameters ***
  DisplayName           = OBJECT:SNR75
  Side                  = Turkey
  MaxSimultaneousOfType = 10
  MaxSimultaneousLinkKey = Patch_AirDefense  ; SPECTER PATCH global limit
  EditorSorting         = STRUCTURE
  TransportSlotCount    = 6
  ArmorSet
    Conditions          = None
    Armor               = AATruckArmor
    DamageFX            = TruckDamageFX
  End
  VisionRange           = 200
  ShroudClearingRange   = 200

  CrushableLevel       = 5
  CommandSet           = None
  ; *** ENGINEERING Parameters ***
  RadarPriority = STRUCTURE
  KindOf = SELECTABLE CAN_CAST_REFLECTIONS PRELOAD STRUCTURE IMMOBILE
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 800
    InitialHealth   = 800
    SubdualDamageCap = 1000
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior        = RebuildHoleExposeDie ModuleTag_08f234
    HoleName      = TurkeySNR75Damaged
    HoleMaxHealth = 500.0
    DeathTypes    = ALL -TOPPLED
  End
  Behavior = ProductionUpdate ModuleTag_UL1
    MaxQueueEntries = 1
  End
  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_08
    DeathTypes = ALL -TOPPLED
    ProbabilityModifier = 50
    DestructionDelay = 2000
    DestructionDelayVariance = 300
    FX  = INITIAL  FX_CrusaderCatchFire
    OCL = FINAL    OCL_RadarVanDeathEffect2
    FX  = FINAL    FX_ScudLauncherExplosionOneFinal
  End
  Behavior = SlowDeathBehavior ModuleTag_TOPPLED01
    DeathTypes = NONE +TOPPLED
  End
  Behavior = TransitionDamageFX ModuleTag_10c23
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  Behavior = FlammableUpdate ModuleTag_12hb4
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
;-------------------- Fire Control System --------------------
  Behavior                  = FireWeaponCollide ModuleTag_RadarSearchMode
    CollideWeapon           = SNR75_Radar_Power
  End
  Behavior = StealthDetectorUpdate ModuleTag_StealthDetection_Radar_Missiles
    DetectionRate             = 400
    DetectionRange            = 400
    ExtraForbiddenKindOf      = INFANTRY
    CanDetectWhileGarrisoned  = No
    CanDetectWhileContained   = No
  End
;-------------------- End Of Fire Control System --------------------

  Geometry            = BOX
  GeometryMajorRadius = 42.0
  GeometryMinorRadius = 10.0
  GeometryHeight      = 20.0     
  GeometryIsSmall     = Yes
  Shadow              = SHADOW_VOLUME 
  ShadowSizeX         = 45
End
