Object Libya_MIC
; PatchBaseCost = 7000
; PatchBaseTime = 60.0
; CountryBalance side=Libya origin=Domestic tech=Standard cat=Building key=UnitCostMult rating=Low cost×0.7268 time×0.8505 => 5087 / 51.0s
Scale = 0.9
  ; *** ART Parameters ***
  SelectPortrait         = irq_mic
  ButtonImage            = irq_mic

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes

    

    ; day ********************************************
    DefaultConditionState
      Model              = Irq_MIC
      Animation          = Irq_MIC.Irq_MIC
      AnimationMode      = Loop
      ;ParticleSysBone    = Smoke01 SteamVent
      ;ParticleSysBone    = Smoke02 SteamVent
    End

    ConditionState       = DAMAGED
      Model              = Irq_MIC
      Animation          = Irq_MIC.Irq_MIC
      AnimationMode      = Loop
      ParticleSysBone    = Smoke01 SteamVent
      ParticleSysBone    = Smoke02 SteamVent
    End

    ConditionState       = REALLYDAMAGED RUBBLE
      Model              = Irq_MIC
      Animation          = Irq_MIC.Irq_MIC
      AnimationMode      = Loop
      ParticleSysBone    = Smoke01 SteamVent
      ParticleSysBone    = Smoke02 SteamVent
    End
  End

  PlacementViewAngle = 45

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:MIC
  Side             = Libya
  EditorSorting    = STRUCTURE
  Prerequisites
    Object = Libya_RadarStation
    Object = Libya_AdvancedAirBase ; FULL-INI-REPAIR was IraqMilitaryAirfield Libya_Airfield_T
    Object = Libya_WarFactory_T ; FULL-INI-REPAIR was IraqMilitaryWarfactory
    Object = Libya_WarFactory_T ; FULL-INI-REPAIR split from `IraqMilitaryWarfactory Libya_WarFactory_T`
  End

  BuildCost           = 5087
  BuildTime           = 51.0          ; in seconds
  EnergyProduction       = -2
  CommandSet             = Libya_MICCommandSet
  MaxSimultaneousOfType  = 1
  VisionRange            = 200.0           ; Shroud clearing distance
  ShroudClearingRange    = 200
  ArmorSet
    Conditions        = None
    Armor             = StructureArmor
    DamageFX          = StructureDamageFXNoShake
  End
  ExperienceValue     = 150 150 150 150  ; Experience point value at each level

  ; *** AUDIO Parameters ***
  VoiceSelect         = AirfieldUSASelect
  SoundOnDamaged        = BuildingDamagedStateLight
  SoundOnReallyDamaged  = BuildingDestroy

  UnitSpecificSounds
    UnderConstruction     = UnderConstructionLoop
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority       = STRUCTURE
  KindOf              = PRELOAD STRUCTURE SELECTABLE FS_FACTORY AUTO_RALLYPOINT IMMOBILE SCORE_CREATE SCORE CAPTURABLE FS_TECHNOLOGY MP_COUNT_FOR_VICTORY FS_ADVANCED_TECH
  Body                = StructureBody ModuleTag_130
    MaxHealth         = 1500.0
    InitialHealth     = 1500.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 3200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End
  Behavior = AutoDepositUpdate ModuleTag_PatchIndustrialIncome
    DepositTiming       = 16000
    DepositAmount       = 13
    InitialCaptureBonus = 0
  End

  Behavior = ObjectCreationUpgrade ModuleTag_14421
    UpgradeObject = OCL_AbbasResearchObject
    TriggeredBy   = Upgrade_AbbasResearchProgram
  End

  Behavior = ObjectCreationUpgrade ModuleTag_6719
    UpgradeObject = OCL_HussienResearchObject
    TriggeredBy   = Upgrade_HussienResearchProgram
  End
  Behavior = ProductionUpdate ModuleTag_12v34gvb
    NumDoorAnimations            = 1
    DoorOpeningTime              = 4000  ;in mSeconds
    DoorWaitOpenTime             = 2000  ;in mSeconds
    DoorCloseTime                = 5000  ;in mSeconds
    ConstructionCompleteDuration = 1500  ;in mSeconds
  End
  Behavior = DefaultProductionExitUpdate ModuleTag_13fdbs
    UnitCreatePoint   = X:  0.0  Y:-27.0   Z:0.0
    NaturalRallyPoint = X: 57.0  Y:-27.0   Z:0.0;NaturalRallyPointX must always match GeometryMajorRadius! -ML
  End

  Behavior = ProductionUpdate ModuleTag_105
    ; nothing
  End
;---------------- Tire Upgrades


  Behavior = CommandSetUpgrade ModuleTag_Tier1
    TriggeredBy = Upgrade_Irq_Tier1
    CommandSet  = Libya_MICCommandSet2
  End
  Behavior = CommandSetUpgrade ModuleTag_Tier2
    TriggeredBy = Upgrade_Irq_Tier2
    CommandSet  = Libya_MICCommandSet3
  End
;----------------- End Of Tier Upgrades

  Behavior             = CreateObjectDie ModuleTag_08
    CreationList  = OCL_SmallStructureDebris
  End
  Behavior             = FXListDie ModuleTag_1091
    DeathFX       = FX_StructureMediumDeath
  End
  Behavior = ProductionUpdate ModuleTag_10v3652
    NumDoorAnimations            = 1
    DoorOpeningTime              = 2000  ;in mSeconds
    DoorWaitOpenTime             = 3000  ;in mSeconds
    DoorCloseTime                = 2000  ;in mSeconds
    ConstructionCompleteDuration = 1500  ;in mSeconds
  End
  Behavior = DefaultProductionExitUpdate ModuleTag_11f453
    UnitCreatePoint   = X: -20.0  Y:-15.0   Z:0.0
    NaturalRallyPoint = X: 40.0  Y:-15.0   Z:0.0 ;NaturalRallyPointX must always match GeometryMajorRadius! -ML
  End

  Behavior = FlammableUpdate ModuleTag_112
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 5       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  Behavior = DestroyDie ModuleTag_07
    ;nothing
  End

  Behavior = TransitionDamageFX ModuleTag_122
    ;-------------DESIGNED FOR MEDIUM SIZED FACTION BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1       = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionMediumExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionMediumShockwave
  End

  Geometry            = CYLINDER
  GeometryMajorRadius = 46.0
  GeometryHeight      = 9.0    
  GeometryIsSmall     = No
  Shadow              = SHADOW_VOLUME
  BuildCompletion     = PLACED_BY_PLAYER


End