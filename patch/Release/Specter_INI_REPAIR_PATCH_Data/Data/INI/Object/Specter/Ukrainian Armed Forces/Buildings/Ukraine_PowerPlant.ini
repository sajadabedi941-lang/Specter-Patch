Object Ukraine_PowerPlant
; PatchBaseCost = 2000
; PatchBaseTime = 12.0
; CountryBalance side=Ukraine origin=Domestic tech=Standard cat=Building key=UnitCostMult rating=MediumLow cost×0.7268 time×0.81 => 1454 / 9.7s
Scale = 0.9

  ; *** ART Parameters ***
  SelectPortrait         = irq_powerplant
  ButtonImage            = irq_powerplant

  Draw = W3DModelDraw ModuleTag_0231
    OkToChangeModelColor = Yes

    

    ; day ********************************************
    DefaultConditionState
      Model              = Iraq_Powerplant
      Animation          = Iraq_Powerplant.Iraq_Powerplant
      AnimationMode      = LOOP
      ParticleSysBone    = Smoke01 SmolderingSmoke
      ParticleSysBone    = Smoke02 SmolderingSmoke
    End

    ConditionState       = DAMAGED
      Model              = Iraq_Powerplant
      Animation          = Iraq_Powerplant.Iraq_Powerplant
      AnimationMode      = LOOP
      ParticleSysBone    = Smoke01 SmolderingSmoke
      ParticleSysBone    = Smoke02 SmolderingSmoke
    End

    ConditionState       = REALLYDAMAGED RUBBLE
      Model              = Iraq_Powerplant
      Animation          = Iraq_Powerplant.Iraq_Powerplant
      AnimationMode      = LOOP
      ParticleSysBone    = Smoke01 SmolderingSmoke
      ParticleSysBone    = Smoke02 SmolderingSmoke
    End
  End


  PlacementViewAngle = -45

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:PowerPlant
  Side             = Ukraine
  EditorSorting    = STRUCTURE

  BuildCost           = 1454
  BuildTime           = 9.7           ; in seconds
  EnergyProduction = 10.5
  EnergyBonus      = 6
  CommandSet          = Ukraine_PowerPlantCommandSet ; FULL-INI-REPAIR was empty/commented
  VisionRange         = 215.0           ; Shroud clearing distance
  ShroudClearingRange = 210.0
  ArmorSet
    Conditions        = None
    Armor             = StructureArmor
    DamageFX          = StructureDamageFXNoShake
  End
  ExperienceValue     = 150 150 150 150  ; Experience point value at each level

  ; *** AUDIO Parameters ***
  VoiceSelect           = ColdFusionReactorSelect
  SoundOnDamaged        = BuildingDamagedStateLight
  SoundOnReallyDamaged  = BuildingDestroy
  SoundAmbient          = PowerPlantAmbientLoop

  UnitSpecificSounds
    UnderConstruction     = UnderConstructionLoop
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority       = STRUCTURE
  KindOf          = PRELOAD STRUCTURE SELECTABLE IMMOBILE SCORE CAPTURABLE FS_POWER MP_COUNT_FOR_VICTORY
  Body            = StructureBody ModuleTag_02536
    MaxHealth       = 800.0
    InitialHealth   = 800.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 3200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End


  Behavior = BaseRegenerateUpdate ModuleTag_202338
    ;No data
  End
  Behavior             = CreateObjectDie ModuleTag_102238
    CreationList  = OCL_SmallStructureDebris
  End
  Behavior             = FXListDie ModuleTag_032395
    DeathFX       = FX_StructureMediumDeath
  End

  Behavior = FlammableUpdate ModuleTag_2113
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 5       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  Behavior = DestroyDie ModuleTag_02375
    ;nothing
  End

  Behavior = TransitionDamageFX ModuleTag_124
    ;-------------DESIGNED FOR MEDIUM SIZED FACTION BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1       = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionMediumExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionMediumShockwave
  End

  Geometry            = BOX
  GeometryMajorRadius = 22.0
  GeometryMinorRadius = 30.0
  GeometryHeight      = 46.0
  GeometryIsSmall     = No
  Shadow          = SHADOW_VOLUME
  BuildCompletion = PLACED_BY_PLAYER

End