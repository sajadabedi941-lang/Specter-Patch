; SPECTER PATCH - Domestic production bonuses
; Stacked only when resolved Origin = Domestic.
; Countries producing their own weapons get lower cost, faster time,
; and reduced upgrade cost (also reflected in EquipmentOrigin Domestic).

DomesticProduction Bonus
  CostMult            = 0.95
  TimeMult            = 0.90
  UpgradeCostMult     = 0.90
  Description         = Extra domestic MIC efficiency on top of Origin=Domestic
End

; Combined with EquipmentOrigin Domestic (0.85 / 0.90 / 0.85):
;   Effective domestic cost ≈ Base × Economy × Tech × Asym × 0.85 × 0.95
;   Effective domestic time ≈ Base × Tech × Asym × 0.90 × 0.90
