; SPECTER PATCH - Automatic pricing defaults
; MatchPath is matched against the Object INI path (forward slashes).
; First match wins (order matters: more specific rules first).
; DefaultOrigin=OwnerDomestic means Origin=Domestic when Object Side owns the tree.
; Explicit PricingEntry in UnitPricingRegistry.ini always overrides these defaults.

PricingDefault AdvancedAirBase
  MatchNameRegex      = .*AdvancedAirBase.*
  Category            = Building
  DefaultOrigin       = OwnerDomestic
  DefaultTechClass    = Standard
End

PricingDefault DronePath
  MatchPath           = */Drones/*
  Category            = Drone
  DefaultOrigin       = OwnerDomestic
  DefaultTechClass    = Standard
End

PricingDefault AirDefenseSites
  MatchPath           = */AirDefense Sites/*
  Category            = AirDefense
  DefaultOrigin       = OwnerDomestic
  DefaultTechClass    = AdvancedAirDefense
End

PricingDefault AirDefenseVehicles
  MatchPath           = */AirDefense/*
  Category            = AirDefense
  DefaultOrigin       = OwnerDomestic
  DefaultTechClass    = AdvancedAirDefense
End

PricingDefault HeavyAircraftNames
  MatchNameRegex      = .*(B52|B2|AWACS|Tanker|Transport|Tu-22|Tu22|IL-76|IL76).*
  Category            = SupportAircraft
  DefaultOrigin       = OwnerDomestic
  DefaultTechClass    = HeavySupportAircraft
End

PricingDefault StrategicBomberNames
  MatchNameRegex      = .*(B52|StrategicBomber|Tu-160|TU160).*
  Category            = Aircraft
  DefaultOrigin       = OwnerDomestic
  DefaultTechClass    = StrategicBomber
End

