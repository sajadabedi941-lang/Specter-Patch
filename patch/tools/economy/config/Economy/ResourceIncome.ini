; SPECTER PATCH - Resource / income advantage by EconomyRating
; Used by ResourceIncome overlays and the pricing tool's income report.
; SupplyIncomeMult scales effective box value / harvester productivity intent.
; OilDepositMult scales TechOilDerrick-style AutoDeposit amounts.
; PortTradeMult scales port / trade / black-market style deposits.
; SupplyBuildingCostMult adjusts supply building BuildCost (richer = slightly costlier infra).

ResourceIncome VeryHigh
  SupplyIncomeMult        = 1.30
  OilDepositMult          = 1.35
  PortTradeMult           = 1.40
  SupplyBuildingCostMult  = 1.10
End

ResourceIncome High
  SupplyIncomeMult        = 1.20
  OilDepositMult          = 1.30
  PortTradeMult           = 1.25
  SupplyBuildingCostMult  = 1.05
End

ResourceIncome MediumHigh
  SupplyIncomeMult        = 1.10
  OilDepositMult          = 1.15
  PortTradeMult           = 1.10
  SupplyBuildingCostMult  = 1.00
End

ResourceIncome Medium
  SupplyIncomeMult        = 1.00
  OilDepositMult          = 1.00
  PortTradeMult           = 1.00
  SupplyBuildingCostMult  = 1.00
End

ResourceIncome MediumLow
  SupplyIncomeMult        = 0.95
  OilDepositMult          = 0.95
  PortTradeMult           = 0.90
  SupplyBuildingCostMult  = 0.95
End

ResourceIncome Low
  SupplyIncomeMult        = 0.90
  OilDepositMult          = 0.90
  PortTradeMult           = 0.85
  SupplyBuildingCostMult  = 0.90
End
